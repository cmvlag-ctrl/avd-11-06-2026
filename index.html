<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test d'Acuité Visuelle Flashée</title>
    <style>
        body {
            margin: 0;
            background: #000;
            font-family: Arial, sans-serif;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            text-align: center;
        }

        #testContainer {
            width: 100%;
            max-width: 900px;
            padding: 20px;
        }

        #introScreen, #endScreen {
            display: block;
        }

        #testScreen {
            display: none;
        }

        #letterDisplay {
            font-size: 200px;
            color: white;
            text-shadow: 0 0 20px white;
            opacity: 0;
            transition: opacity 0.01s linear;
            margin: 20px 0;
            font-weight: bold;
            min-height: 220px;
        }

        #keyboardResponse {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 10px;
            margin-top: 30px;
        }

        .letterButton {
            background: #4ecdc4;
            border: none;
            padding: 12px 16px;
            font-size: 20px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            min-width: 52px;
        }

        .letterButton:hover {
            background: #45b7b8;
        }

        #startButton {
            background: #4CAF50;
            border: none;
            padding: 12px 24px;
            font-size: 18px;
            border-radius: 8px;
            cursor: pointer;
            margin-top: 20px;
        }

        #results {
            margin-top: 20px;
            font-size: 18px;
        }

        #prompt {
            font-size: 18px;
            margin: 10px 0 0 0;
            min-height: 28px;
        }
    </style>
</head>
<body>
    <div id="testContainer">
        <div id="introScreen">
            <h1>Test d'Acuité Visuelle Flashée</h1>
            <p>Appuyez sur démarrer pour lancer le test.</p>
            <button id="startButton">DÉMARRER LE TEST</button>
        </div>

        <div id="testScreen">
            <div id="letterDisplay"></div>
            <div id="keyboardResponse"></div>
        </div>

        <div id="endScreen" style="display:none;">
            <h2>Test terminé</h2>
            <div id="results"></div>
            <button id="restartButton" class="letterButton" style="margin-top:20px;">RECOMMENCER</button>
        </div>
    </div>

    <script>
        const CONFIG = {
            flashDuration: 60,      // on garde la durée courte
            minFontSize: 20,
            maxFontSize: 400,
            sizeDecreaseFactor: 0.9,
            sizeIncreaseFactor: 1.1,
            maxErrorsInRow: 3,
            nextDelay: 500          // délai entre les essais
        };

        const letters = ['A', 'B', 'C', 'D', 'E', 'F', 'H', 'K', 'L', 'M', 'N', 'O', 'P', 'R', 'S', 'T', 'U', 'V', 'X', 'Z'];

        const state = {
            currentFontSize: 200,
            currentLetter: '',
            errorsInRow: 0,
            totalTrials: 0,
            correctAnswers: 0,
            isTestRunning: false,
            timeouts: []
        };

        let introScreen, testScreen, endScreen, letterDisplay, keyboardResponse, results, startButton, restartButton;

        document.addEventListener('DOMContentLoaded', () => {
            introScreen = document.getElementById('introScreen');
            testScreen = document.getElementById('testScreen');
            endScreen = document.getElementById('endScreen');
            letterDisplay = document.getElementById('letterDisplay');
            keyboardResponse = document.getElementById('keyboardResponse');
            results = document.getElementById('results');
            startButton = document.getElementById('startButton');
            restartButton = document.getElementById('restartButton');

            startButton.addEventListener('click', startTest);
            restartButton.addEventListener('click', startTest);

            setupKeyboardResponse();
        });

        function setupKeyboardResponse() {
            keyboardResponse.innerHTML = '';
            letters.forEach(letter => {
                const button = document.createElement('button');
                button.className = 'letterButton';
                button.textContent = letter;
                button.addEventListener('click', () => validateAnswer(letter));
                keyboardResponse.appendChild(button);
            });
        }

        function startTest() {
            clearAllTimeouts();

            state.currentFontSize = 200;
            state.currentLetter = '';
            state.errorsInRow = 0;
            state.totalTrials = 0;
            state.correctAnswers = 0;
            state.isTestRunning = true;

            introScreen.style.display = 'none';
            endScreen.style.display = 'none';
            testScreen.style.display = 'block';

            letterDisplay.style.opacity = '0';
            letterDisplay.style.color = 'white';
            letterDisplay.textContent = '';

            showNextLetter();
        }

        function showNextLetter() {
            if (!state.isTestRunning) return;

            state.currentLetter = letters[Math.floor(Math.random() * letters.length)];
            letterDisplay.textContent = state.currentLetter;
            letterDisplay.style.fontSize = `${state.currentFontSize}px`;
            letterDisplay.style.color = 'white';
            letterDisplay.style.opacity = '1';

            const hideTimeout = setTimeout(() => {
                letterDisplay.style.opacity = '0';
            }, CONFIG.flashDuration);

            state.timeouts.push(hideTimeout);
        }

        function validateAnswer(selectedLetter) {
            if (!state.isTestRunning) return;

            const isCorrect = selectedLetter === state.currentLetter;
            state.totalTrials++;

            if (isCorrect) {
                state.correctAnswers++;
                state.errorsInRow = 0;
                state.currentFontSize = Math.max(
                    CONFIG.minFontSize,
                    Math.round(state.currentFontSize * CONFIG.sizeDecreaseFactor)
                );
            } else {
                state.errorsInRow++;
                state.currentFontSize = Math.min(
                    CONFIG.maxFontSize,
                    Math.round(state.currentFontSize * CONFIG.sizeIncreaseFactor)
                );

                if (state.errorsInRow >= CONFIG.maxErrorsInRow) {
                    endTest();
                    return;
                }
            }

            const nextTimeout = setTimeout(() => {
                if (!state.isTestRunning) return;
                showNextLetter();
            }, CONFIG.nextDelay);

            state.timeouts.push(nextTimeout);
        }

        function endTest() {
            state.isTestRunning = false;
            clearAllTimeouts();

            testScreen.style.display = 'none';
            endScreen.style.display = 'block';

            const score = calculateAcuityScore();
            const accuracy = state.totalTrials > 0 ? Math.round((state.correctAnswers / state.totalTrials) * 100) : 0;

            let evaluation = '';
            if (score >= 0.8) evaluation = 'Excellente';
            else if (score >= 0.6) evaluation = 'Bonne';
            else if (score >= 0.4) evaluation = 'Moyenne';
            else evaluation = 'Faible';

            results.innerHTML = `
                <p><strong>Essais :</strong> ${state.totalTrials}</p>
                <p><strong>Bonnes réponses :</strong> ${state.correctAnswers}</p>
                <p><strong>Taux de réussite :</strong> ${accuracy}%</p>
                <p><strong>Taille minimale atteinte :</strong> ${state.currentFontSize}px</p>
                <p><strong>Acuité estimée :</strong> ${score.toFixed(2)}/1.0</p>
                <p><strong>Évaluation :</strong> ${evaluation}</p>
            `;
        }

        function calculateAcuityScore() {
            return Math.min(1.0, CONFIG.maxFontSize / state.currentFontSize);
        }

        function clearAllTimeouts() {
            state.timeouts.forEach(timeoutId => clearTimeout(timeoutId));
            state.timeouts = [];
        }
    </script>
</body>
</html>
