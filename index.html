<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test d'Acuité Flashée - Calibration Corrigée</title>
    <script src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js"></script>
    <style>
        body {
            margin: 0;
            background: #000;
            color: white;
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            text-align: center;
        }
        #testContainer {
            width: 100%;
            max-width: 800px;
            padding: 20px;
        }
        #letterDisplay {
            font-size: 200px;
            color: white;
            text-shadow: 0 0 20px white;
            opacity: 0;
            transition: opacity 0.1s linear;
            margin: 20px 0;
            font-weight: bold;
        }
        #prompt {
            font-size: 24px;
            margin: 20px 0;
            min-height: 60px;
        }
        #validationButtons {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 10px;
            margin: 20px 0;
        }
        .letterButton {
            background: #4ecdc4;
            border: none;
            padding: 15px 20px;
            font-size: 24px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            min-width: 60px;
        }
        .letterButton:hover {
            background: #45b7b8;
        }
        #results {
            margin-top: 20px;
            font-size: 20px;
            min-height: 100px;
        }
        #startButton {
            background: #4CAF50;
            border: none;
            padding: 15px 30px;
            font-size: 20px;
            border-radius: 8px;
            cursor: pointer;
            margin-bottom: 20px;
        }
        #infoDisplay {
            font-size: 18px;
            margin: 10px 0;
        }
        #distanceInfo {
            color: #4CAF50;
        }
        #sizeInfo {
            color: #2196F3;
        }
        #errorInfo {
            color: #f44336;
        }
    </style>
</head>
<body>
    <div id="testContainer">
        <h1>Test d'Acuité Visuelle</h1>
        <p id="prompt">Autorisez l'accès à la caméra pour commencer...</p>

        <div id="infoDisplay">
            <span id="distanceInfo">Distance: -- cm</span><br>
            <span id="sizeInfo">Taille lettre: -- px</span><br>
            <span id="errorInfo">Erreurs: 0/3</span>
        </div>

        <div id="letterDisplay"></div>

        <div id="validationButtons" style="display: none;">
            <button class="letterButton" onclick="validate('E')">E</button>
            <button class="letterButton" onclick="validate('F')">F</button>
            <button class="letterButton" onclick="validate('P')">P</button>
            <button class="letterButton" onclick="validate('T')">T</button>
            <button class="letterButton" onclick="validate('Z')">Z</button>
        </div>

        <div id="results"></div>
        <button id="startButton" onclick="startTest()">DÉMARRER LE TEST</button>
    </div>

    <video id="video" autoplay muted style="display: none;"></video>

    <script>
        // =============================================
        // CONFIGURATION (à ajuster si nécessaire)
        // =============================================
        const REFERENCE_DISTANCE = 50;   // Distance de référence (cm)
        const REFERENCE_SIZE = 150;      // Taille de référence à REFERENCE_DISTANCE (px)
        const MIN_FONT_SIZE = 20;        // Taille minimale (px)
        const SIZE_REDUCTION = 0.8;      // Réduction de 20% par bonne réponse
        const SIZE_INCREASE = 1.1;       // Augmentation de 10% par erreur
        const FLASH_DURATION = 60;       // Durée du flash (ms)
        const CALIBRATION_DELAY = 2000;  // Délai avant début du test (ms)

        // =============================================
        // VARIABLES GLOBALES
        // =============================================
        let currentFontSize = REFERENCE_SIZE;
        let errors = 0;
        let isTestRunning = false;
        let faceDistance = REFERENCE_DISTANCE;
        let videoStream = null;

        // =============================================
        // INITIALISATION
        // =============================================
        async function startTest() {
            document.getElementById('startButton').style.display = 'none';
            document.getElementById('prompt').textContent = "Calibration en cours...";

            // Charger les modèles de face-api.js
            await loadFaceModels();

            // Configurer la caméra
            await setupCamera();

            // Lancer la calibration toutes les 500ms
            setInterval(updateFaceDistance, 500);

            // Attendre la calibration avant de commencer
            setTimeout(beginTest, CALIBRATION_DELAY);
        }

        async function loadFaceModels() {
            try {
                // Charger les modèles depuis un CDN fiable
                await faceapi.nets.tinyFaceDetector.loadFromUri('https://justadudewhohacks.github.io/face-api.js/models');
                await faceapi.nets.faceLandmark68Net.loadFromUri('https://justadudewhohacks.github.io/face-api.js/models');
            } catch (error) {
                console.error("Erreur de chargement des modèles face-api.js:", error);
                alert("Impossible de charger les modèles de détection faciale. Vérifiez votre connexion internet.");
                throw error;
            }
        }

        async function setupCamera() {
            const video = document.getElementById('video');
            try {
                videoStream = await navigator.mediaDevices.getUserMedia({ video: true });
                video.srcObject = videoStream;
            } catch (error) {
                console.error("Erreur d'accès à la caméra:", error);
                alert("Impossible d'accéder à la caméra. Vérifiez les permissions.");
                throw error;
            }
        }

        // =============================================
        // CALIBRATION DE DISTANCE (CORRIGÉE)
        // =============================================
        async function updateFaceDistance() {
            const video = document.getElementById('video');
            if (!video || video.readyState !== 4) return;

            try {
                // Détecter le visage avec landmarks
                const detection = await faceapi.detectSingleFace(
                    video,
                    new faceapi.TinyFaceDetectorOptions()
                ).withFaceLandmarks();

                if (detection) {
                    // Calculer la distance réelle en utilisant la distance entre les yeux
                    // (plus précise que la largeur du visage)
                    const leftEye = detection.landmarks.getLeftEye();
                    const rightEye = detection.landmarks.getRightEye();

                    // Distance entre les yeux en pixels
                    const eyeDistancePx = Math.sqrt(
                        Math.pow(rightEye[0].x - leftEye[0].x, 2) +
                        Math.pow(rightEye[0].y - leftEye[0].y, 2)
                    );

                    // Distance réelle en cm (formule empirique basée sur la taille moyenne d'un visage)
                    // La distance inter-pupillaire moyenne est d'environ 6.5 cm
                    faceDistance = Math.round((6.5 * REFERENCE_DISTANCE) / eyeDistancePx);

                    // Mettre à jour l'affichage
                    updateUI();
                }
            } catch (error) {
                console.error("Erreur de détection faciale:", error);
            }
        }

        function updateUI() {
            document.getElementById('distanceInfo').textContent = `Distance: ${faceDistance} cm`;
            // Adapter la taille de la lettre à la distance
            currentFontSize = Math.max(
                MIN_FONT_SIZE,
                Math.round(REFERENCE_SIZE * (REFERENCE_DISTANCE / faceDistance))
            );
            document.getElementById('sizeInfo').textContent = `Taille lettre: ${currentFontSize} px`;
        }

        // =============================================
        // LOGIQUE DU TEST (inchangée)
        // =============================================
        function beginTest() {
            document.getElementById('prompt').textContent = "Test en cours...";
            document.getElementById('validationButtons').style.display = 'flex';
            isTestRunning = true;

            // Lancer le premier flash
            setTimeout(flashLetter, 1000);
        }

        function flashLetter() {
            if (!isTestRunning) return;

            const letters = ['E', 'F', 'P', 'T', 'Z'];
            const letter = letters[Math.floor(Math.random() * letters.length)];
            const letterDisplay = document.getElementById('letterDisplay');

            letterDisplay.textContent = letter;
            letterDisplay.style.opacity = '1';
            letterDisplay.style.fontSize = `${currentFontSize}px`;

            // Masquer après le flash
            setTimeout(() => {
                letterDisplay.style.opacity = '0';
                // Relancer après 1 seconde
                setTimeout(flashLetter, 1000);
            }, FLASH_DURATION);
        }

        function validate(selectedLetter) {
            if (!isTestRunning) return;

            isTestRunning = false;
            const correctLetter = document.getElementById('letterDisplay').textContent;

            if (selectedLetter === correctLetter) {
                // Bonne réponse : réduire la taille de 20%
                currentFontSize = Math.max(MIN_FONT_SIZE, Math.round(currentFontSize * SIZE_REDUCTION));
            } else {
                // Mauvaise réponse : augmenter la taille de 10% et compter une erreur
                errors++;
                currentFontSize = Math.round(currentFontSize * SIZE_INCREASE);
                document.getElementById('errorInfo').textContent = `Erreurs: ${errors}/3`;
            }

            updateUI();

            // Vérifier si le test est terminé
            if (errors >= 3) {
                endTest();
                return;
            }

            // Relancer après 1 seconde
            setTimeout(() => {
                isTestRunning = true;
                setTimeout(flashLetter, 500);
            }, 1000);
        }

        function endTest() {
            isTestRunning = false;
            document.getElementById('prompt').textContent = "Test terminé !";
            document.getElementById('validationButtons').style.display = 'none';

            // Calculer le score d'acuité
            const acuityScore = Math.min(1.0, REFERENCE_SIZE / currentFontSize);

            // Afficher les résultats
            const resultsDiv = document.getElementById('results');
            resultsDiv.innerHTML = `
                <h2>Résultats</h2>
                <p>Taille minimale atteinte: ${currentFontSize} px</p>
                <p>Score d'acuité: ${acuityScore.toFixed(2)}</p>
                <p>Distance mesurée: ${faceDistance} cm</p>
                <p>Évaluation: ${getAcuityEvaluation(acuityScore)}</p>
            `;

            // Arrêter la caméra
            if (videoStream) {
                videoStream.getTracks().forEach(track => track.stop());
            }
        }

        function getAcuityEvaluation(score) {
            if (score >= 0.8) return "Excellente";
            if (score >= 0.6) return "Bonne";
            if (score >= 0.4) return "Moyenne";
            return "Faible";
        }
    </script>
</body>
</html>
