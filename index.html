<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AVD - Correction Détection</title>
    <style>
        body { margin: 0; background: #111; overflow: hidden; font-family: 'Segoe UI', sans-serif; color: white; }
        
        /* Vidéo miroir */
        #video {
            position: absolute; top: 0; left: 0; width: 100vw; height: 100vh;
            object-fit: cover; opacity: 0.3; z-index: 1; transform: scaleX(-1);
        }

        /* Calque de dessin (Carré rouge) */
        #overlayCanvas {
            position: absolute; top: 0; left: 0; width: 100vw; height: 100vh;
            z-index: 2; transform: scaleX(-1); pointer-events: none;
        }

        /* Lettre centrale */
        #target {
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            font-family: sans-serif; font-weight: bold; color: #fff;
            opacity: 0; z-index: 10; pointer-events: none;
            text-shadow: 0 0 10px #000;
        }

        /* Panneau de contrôle */
        #panel {
            position: absolute; top: 10px; left: 10px; z-index: 20;
            background: rgba(0, 0, 0, 0.8); padding: 15px; border-radius: 8px;
            width: 280px; border: 1px solid #444;
        }
        h3 { margin: 0 0 10px 0; font-size: 16px; color: #4ecdc4; }
        .row { display: flex; justify-content: space-between; margin-bottom: 5px; font-size: 13px; }
        .val { font-weight: bold; color: #fff; }
        
        button {
            width: 100%; padding: 10px; margin-top: 5px; border: none; border-radius: 4px;
            cursor: pointer; font-weight: bold; color: white; transition: 0.2s;
        }
        .btn-start { background: #0984e3; }
        .btn-test { background: #fdcb6e; color: #000; }
        .btn-train { background: #e17055; }
        
        #status { 
            position: absolute; top: 10px; right: 10px; z-index: 20;
            background: red; color: white; padding: 5px 10px; border-radius: 4px; font-weight: bold; display: none;
        }
    </style>
</head>
<body>

    <div id="status">PAS DE VISAGE DÉTECTÉ</div>

    <video id="video" playsinline autoplay muted></video>
    <canvas id="overlayCanvas"></canvas>
    <div id="target">E</div>

    <div id="panel">
        <h3>Configuration</h3>
        <div class="row"><span>Vitesse Tête:</span> <span id="dispSpeed" class="val">0</span></div>
        <div class="row"><span>Acuité (Dixième):</span> <span id="dispAcuity" class="val">1.0</span></div>
        <input type="range" id="sliderAcuity" min="0.1" max="2.0" step="0.1" value="1.0" style="width:100%; margin: 10px 0;">
        
        <button class="btn-start" onclick="initCamera()">1. ACTIVER CAMÉRA</button>
        <button class="btn-test" onclick="startStaticTest()">2. TEST SEUIL (Statique)</button>
        <button class="btn-train" onclick="startDynamicTraining()">3. ENTRAINEMENT (Dynamique)</button>
    </div>

    <!-- Chargement des librairies -->
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@3.18.0/dist/tf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/blazeface@0.0.7/dist/blazeface.min.js"></script>

    <script>
        let video, canvas, ctx, targetEl, statusEl;
        let model = null;
        let isCameraReady = false;
        
        // Variables de suivi
        let lastNoseX = 0;
        let lastNoseY = 0;
        let lastTime = 0;
        let currentSpeed = 0;
        let acuity = 1.0;
        
        // Modes
        let mode = 'IDLE'; // IDLE, STATIC, DYNAMIC
        let staticTimer = null;
        let lastFlashTime = 0;

        // Initialisation DOM
        window.addEventListener('load', () => {
            video = document.getElementById('video');
            canvas = document.getElementById('overlayCanvas');
            ctx = canvas.getContext('2d');
            targetEl = document.getElementById('target');
            statusEl = document.getElementById('status');
            
            // Mise à jour slider
            document.getElementById('sliderAcuity').addEventListener('input', (e) => {
                acuity = parseFloat(e.target.value);
                document.getElementById('dispAcuity').innerText = acuity.toFixed(1);
            });
            
            // Ajuster canvas au redimensionnement
            window.addEventListener('resize', resizeCanvas);
            resizeCanvas();
        });

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }

        async function initCamera() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({
                    video: { facingMode: 'user', width: 640, height: 480 }
                });
                video.srcObject = stream;
                await new Promise(r => video.onloadedmetadata = r);
                video.play();
                
                document.querySelector('.btn-start').innerText = "CAMÉRA ACTIVE";
                document.querySelector('.btn-start').style.background = "#00b894";
                isCameraReady = true;
                
                // Charger le modèle
                statusEl.style.display = 'block';
                statusEl.innerText = "CHARGEMENT IA...";
                model = await blazeface.load();
                statusEl.style.display = 'none';
                
                // Lancer la boucle de détection
                detectLoop();
                
            } catch (err) {
                alert("Erreur Caméra: " + err);
            }
        }

        async function detectLoop() {
            if (!isCameraReady) return;

            // Nettoyer le canvas
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Détection
            // returnTensors: false pour avoir des coordonnées simples
            const predictions = await model.estimateFaces(video, false);

            if (predictions.length > 0) {
                statusEl.style.display = 'none';
                const face = predictions[0];
                
                // 1. DESSINER LE CARRÉ ROUGE (Diagnostic)
                const start = face.boundingBox.topLeft;
                const end = face.boundingBox.bottomRight;
                const width = end[0] - start[0];
                const height = end[1] - start[1];

                ctx.strokeStyle = '#ff0000';
                ctx.lineWidth = 4;
                ctx.strokeRect(start[0], start[1], width, height);

                // 2. CALCUL VITESSE (Basé sur le nez)
                // landmarks[2] est approximativement le nez
                const nose = face.landmarks[2]; 
                const now = performance.now();

                if (lastTime > 0) {
                    const dt = now - lastTime;
                    // Distance euclidienne
                    const dist = Math.sqrt(Math.pow(nose[0] - lastNoseX, 2) + Math.pow(nose[1] - lastNoseY, 2));
                    
                    // Vitesse en pixels par seconde
                    currentSpeed = (dist / dt) * 1000;
                }

                lastNoseX = nose[0];
                lastNoseY = nose[1];
                lastTime = now;

                // 3. LOGIQUE ENTRAINEMENT
                if (mode === 'DYNAMIC') {
                    // Seuil de déclenchement: 100 pixels/seconde (ajuster selon besoin)
                    if (currentSpeed > 100) {
                        triggerFlash();
                    }
                }

            } else {
                statusEl.style.display = 'block';
                statusEl.innerText = "JE NE VOIS PAS VOTRE VISAGE";
                currentSpeed = 0;
            }

            // Update UI Vitesse
            document.getElementById('dispSpeed').innerText = Math.round(currentSpeed);

            requestAnimationFrame(detectLoop);
        }

        function triggerFlash() {
            const now = performance.now();
            // Anti-rebond : attendre 800ms entre deux flashes
            if (now - lastFlashTime < 800) return;
            
            lastFlashTime = now;
            
            // Calcul taille lettre
            // Formule simplifiée : plus l'acuité est haute, plus la lettre est petite
            const baseSize = 200; 
            const sizePx = baseSize / acuity;
            
            targetEl.style.fontSize = sizePx + 'px';
            targetEl.innerText = getRandomLetter();
            targetEl.style.opacity = 1;
            
            // Disparition à 60ms
            setTimeout(() => {
                targetEl.style.opacity = 0;
            }, 60);
        }

        function getRandomLetter() {
            const letters = ['C', 'D', 'E', 'F', 'L', 'O', 'P', 'T', 'Z'];
            return letters[Math.floor(Math.random() * letters.length)];
        }

        // --- MODE TEST STATIQUE ---
        function startStaticTest() {
            mode = 'STATIC';
            alert("TEST STATIQUE : Restez immobile. Les lettres vont défiler.");
            
            if (staticTimer) clearInterval(staticTimer);
            
            let testAcuity = 0.1;
            staticTimer = setInterval(() => {
                // Afficher lettre
                targetEl.style.fontSize = (200 / testAcuity) + 'px';
                targetEl.innerText = getRandomLetter();
                targetEl.style.opacity = 1;
                
                // Cacher après 60ms
                setTimeout(() => targetEl.style.opacity = 0, 60);
                
                // Incrémenter difficulté
                testAcuity += 0.1;
                if (testAcuity > 2.0) {
                    clearInterval(staticTimer);
                    alert("Test terminé.");
                }
                
                // Update slider pour info
                document.getElementById('sliderAcuity').value = testAcuity;
                document.getElementById('dispAcuity').innerText = testAcuity.toFixed(1);
                
            }, 1500); // Toutes les 1.5 secondes
        }

        // --- MODE ENTRAINEMENT DYNAMIQUE ---
        function startDynamicTraining() {
            if (staticTimer) clearInterval(staticTimer);
            mode = 'DYNAMIC';
            alert("ENTRAINEMENT : Bougez la tête ! La lettre n'apparaît que si vous bougez vite.");
        }

    </script>
</body>
</html>
