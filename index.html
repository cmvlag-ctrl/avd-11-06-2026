<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test d'Acuité Visuelle - Calibré</title>
    <script src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js"></script>
    <style>
        body { margin: 0; background: #000; color: white; font-family: Arial; text-align: center; }
        #container { padding: 20px; }
        #video { display: none; }
        #letter { font-size: 200px; color: white; margin: 20px 0; opacity: 0; transition: opacity 0.1s; }
        #prompt { font-size: 24px; min-height: 60px; }
        #buttons { display: flex; gap: 10px; justify-content: center; margin: 20px 0; }
        button { padding: 15px 20px; font-size: 24px; border: none; border-radius: 8px; cursor: pointer; }
        #startBtn { background: #4CAF50; }
        #letterBtn { background: #4ecdc4; }
        #results { margin-top: 20px; font-size: 20px; }
        .info { margin: 10px 0; }
        .distance { color: #4CAF50; }
        .size { color: #2196F3; }
        .error { color: #f44336; }
    </style>
</head>
<body>
    <div id="container">
        <h1>Test d'Acuité Visuelle</h1>
        <p id="prompt">Calibration en cours...</p>

        <div class="info">
            <span class="distance">Distance: -- cm</span><br>
            <span class="size">Taille lettre: -- px</span><br>
            <span class="error">Erreurs: 0/3</span>
        </div>

        <video id="video" autoplay muted></video>
        <div id="letter"></div>

        <div id="buttons" style="display: none;">
            <button id="letterBtn" onclick="validate('E')">E</button>
            <button id="letterBtn" onclick="validate('F')">F</button>
            <button id="letterBtn" onclick="validate('P')">P</button>
            <button id="letterBtn" onclick="validate('T')">T</button>
            <button id="letterBtn" onclick="validate('Z')">Z</button>
        </div>

        <div id="results"></div>
        <button id="startBtn" onclick="start()">DÉMARRER (autorisez la caméra)</button>
    </div>

    <script>
        // Configuration
        const REF_DIST = 50;       // Distance de référence (cm)
        const REF_SIZE = 150;      // Taille de référence à REF_DIST (px)
        const MIN_SIZE = 20;       // Taille minimale
        const SIZE_REDUCE = 0.8;   // Réduction de 20% par bonne réponse
        const SIZE_INCREASE = 1.1; // Augmentation de 10% par erreur
        const FLASH_DURATION = 60; // Flash en ms

        // Variables
        let currentSize = REF_SIZE;
        let errors = 0;
        let isRunning = false;
        let faceDist = REF_DIST;

        // Démarrer le test
        async function start() {
            document.getElementById('startBtn').style.display = 'none';
            document.getElementById('prompt').textContent = "Placez votre visage à ~50cm de la caméra";

            // Charger les modèles de face-api
            await loadModels();
            await setupCamera();

            // Lancer la calibration toutes les 500ms
            setInterval(updateDistance, 500);
            setTimeout(beginTest, 2000);
        }

        // Charger les modèles de face-api
        async function loadModels() {
            try {
                await faceapi.nets.tinyFaceDetector.loadFromUri('https://justadudewhohacks.github.io/face-api.js/models');
                await faceapi.nets.faceLandmark68Net.loadFromUri('https://justadudewhohohacks.github.io/face-api.js/models');
            } catch (e) {
                alert("Erreur de chargement des modèles face-api.js. Vérifiez votre connexion.");
                console.error(e);
            }
        }

        // Configurer la caméra
        async function setupCamera() {
            const video = document.getElementById('video');
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: true });
                video.srcObject = stream;
            } catch (e) {
                alert("Impossible d'accéder à la caméra. Vérifiez les permissions.");
                console.error(e);
            }
        }

        // Mettre à jour la distance estimée
        async function updateDistance() {
            const video = document.getElementById('video');
            if (!video || video.readyState !== 4) return;

            try {
                const detection = await faceapi.detectSingleFace(
                    video,
                    new faceapi.TinyFaceDetectorOptions()
                ).withFaceLandmarks();

                if (detection) {
                    // Calcul de distance basé sur la largeur du visage
                    const faceWidth = detection.box.width;
                    faceDist = Math.round((REF_DIST * REF_SIZE) / faceWidth);
                    updateUI();
                }
            } catch (e) {
                console.error("Erreur détection faciale:", e);
            }
        }

        // Adapter la taille à la distance
        function updateUI() {
            document.querySelector('.distance').textContent = `Distance: ${faceDist} cm`;
            currentSize = Math.max(MIN_SIZE, Math.round(REF_SIZE * (REF_DIST / faceDist)));
            document.querySelector('.size').textContent = `Taille lettre: ${currentSize} px`;
        }

        // Début du test
        function beginTest() {
            document.getElementById('prompt').textContent = "Test en cours...";
            document.getElementById('buttons').style.display = 'flex';
            isRunning = true;
            flashLetter();
        }

        // Afficher une lettre
        function flashLetter() {
            if (!isRunning) return;

            const letters = ['E', 'F', 'P', 'T', 'Z'];
            const letter = letters[Math.floor(Math.random() * letters.length)];
            const letterEl = document.getElementById('letter');

            letterEl.textContent = letter;
            letterEl.style.opacity = '1';
            letterEl.style.fontSize = `${currentSize}px`;

            setTimeout(() => {
                letterEl.style.opacity = '0';
                setTimeout(flashLetter, 1000);
            }, FLASH_DURATION);
        }

        // Valider une réponse
        function validate(selected) {
            if (!isRunning) return;

            isRunning = false;
            const correct = document.getElementById('letter').textContent;

            if (selected === correct) {
                currentSize = Math.max(MIN_SIZE, Math.round(currentSize * SIZE_REDUCE));
            } else {
                errors++;
                currentSize = Math.round(currentSize * SIZE_INCREASE);
                document.querySelector('.error').textContent = `Erreurs: ${errors}/3`;
            }

            updateUI();

            if (errors >= 3) {
                endTest();
                return;
            }

            setTimeout(() => {
                isRunning = true;
                setTimeout(flashLetter, 500);
            }, 1000);
        }

        // Terminer le test
        function endTest() {
            isRunning = false;
            document.getElementById('prompt').textContent = "Test terminé !";
            document.getElementById('buttons').style.display = 'none';

            const score = Math.min(1.0, REF_SIZE / currentSize);
            document.getElementById('results').innerHTML = `
                <h2>Résultats</h2>
                <p>Taille minimale: ${currentSize} px</p>
                <p>Score d'acuité: ${score.toFixed(2)}</p>
                <p>Distance mesurée: ${faceDist} cm</p>
                <p>Évaluation: ${score >= 0.8 ? 'Excellente' : score >= 0.6 ? 'Bonne' : score >= 0.4 ? 'Moyenne' : 'Faible'}</p>
            `;

            // Arrêter la caméra
            const stream = document.getElementById('video').srcObject;
            if (stream) stream.getTracks().forEach(track => track.stop());
        }
    </script>
</body>
</html>
