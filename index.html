<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Test AV - Calibrage Précis</title>
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: 'Segoe UI', sans-serif; color: white; user-select: none; touch-action: none; }
        
        /* Vidéo en arrière-plan */
        video {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            object-fit: cover; opacity: 0.2; z-index: 1; transform: scaleX(-1);
        }

        /* La Lettre */
        #letterDisplay {
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            font-family: Arial, sans-serif;
            font-weight: bold; color: white;
            opacity: 0; z-index: 10; pointer-events: none;
            will-change: opacity, font-size;
            text-shadow: 0 0 10px rgba(0,0,0,0.8);
        }

        /* Interface UI */
        #ui-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 50; pointer-events: none; }
        .interactive { pointer-events: auto; }

        #settingsBtn {
            position: absolute; top: 15px; left: 15px;
            background: rgba(255,255,255,0.2); border: 1px solid white;
            color: white; width: 40px; height: 40px; border-radius: 50%;
            font-size: 20px; cursor: pointer; display: flex; align-items: center; justify-content: center;
            backdrop-filter: blur(5px);
        }

        #settingsPanel {
            position: absolute; top: 65px; left: 15px;
            background: rgba(0,0,0,0.95); padding: 20px; border-radius: 12px;
            width: 280px; border: 1px solid #444;
            display: none;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .control-group { margin-bottom: 15px; }
        .label-row { display: flex; justify-content: space-between; font-size: 13px; margin-bottom: 5px; color: #ccc; }
        .val-blue { color: #00d2ff; font-weight: bold; }
        
        input[type=range] { width: 100%; accent-color: #00d2ff; margin: 5px 0; }
        
        button.btn {
            background: #333; border: 1px solid #555; color: white; padding: 10px; 
            border-radius: 6px; width: 100%; cursor: pointer; margin-top: 5px; font-size: 13px; transition: 0.2s;
        }
        button.btn:hover { background: #444; }
        button.btn-primary { background: #00d2ff; color: #000; border: none; font-weight: bold; }
        button.btn-primary:hover { background: #00b8e6; }
        button.btn-test { 
            background: #ff4444; color: white; border: none; font-weight: bold; 
            padding: 15px 30px; border-radius: 30px; font-size: 16px;
            box-shadow: 0 4px 15px rgba(255,0,0,0.3);
        }

        /* Zone de calibrage */
        #calibContainer { 
            display: none; margin-top: 10px; padding: 15px; background: #111; border-radius: 8px; border: 1px dashed #444; text-align: center;
        }
        .calib-bar { 
            height: 20px; background: #ff4444; width: 50px; margin: 15px auto; 
            border-left: 1px solid white; border-right: 1px solid white; 
        }

        /* Stats en bas */
        #statsBar {
            position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%);
            display: flex; gap: 20px; font-size: 14px; color: #aaa; 
            background: rgba(0,0,0,0.7); padding: 10px 20px; border-radius: 20px;
            border: 1px solid #333;
        }
        .stat-box { text-align: center; }
        .stat-val { color: #00d2ff; font-weight: bold; display: block; font-size: 16px; }

        #testBtnContainer {
            position: absolute; bottom: 20px; right: 20px;
        }

        #startOverlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; z-index: 200; display: flex; flex-direction: column;
            align-items: center; justify-content: center; text-align: center;
        }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.11.0"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/blazeface@0.0.7"></script>
</head>
<body>

    <div id="startOverlay">
        <h2 style="color:white; margin-bottom:20px;">TEST ACUITÉ VISUELLE</h2>
        <div style="max-width: 300px; color:#aaa; margin-bottom:30px; line-height: 1.5;">
            1. Calibrez avec une règle physique.<br>
            2. Utilisez le bouton TEST pour vérifier la taille.<br>
            3. Bougez la tête vite (>150°/s) pour le mode auto.
        </div>
        <button class="btn btn-primary" style="width:auto; padding:15px 40px; font-size:18px;" onclick="startApp()">COMMENCER</button>
    </div>

    <video id="video" playsinline autoplay muted></video>
    <div id="letterDisplay">E</div>

    <div id="ui-layer">
        <div id="settingsBtn" class="interactive" onclick="toggleSettings()">⚙️</div>

        <div id="settingsPanel" class="interactive">
            <div style="font-weight:bold; color:#00d2ff; margin-bottom:15px;">RÉGLAGES</div>

            <div class="control-group">
                <div class="label-row"><span>Acuité (1/10)</span> <span id="acuityVal" class="stat-val">1.0</span></div>
                <input type="range" id="acuityRange" min="0.1" max="2.0" step="0.1" value="1.0" oninput="updateAcuity()">
            </div>

            <button class="btn" onclick="toggleCalib()">📏 Calibrer (Règle 1cm)</button>
            
            <div id="calibContainer">
                <p style="font-size:12px; color:#ddd; margin:0 0 5px 0;">
                    Posez une règle sur l'écran.<br>Ajustez la barre rouge à <b>1 CM</b> exactement.
                </p>
                <div class="calib-bar" id="calibBar"></div>
                <input type="range" id="calibRange" min="20" max="150" step="1" value="50" oninput="updateCalibPreview()">
                <button class="btn btn-primary" onclick="saveCalib()">VALIDER</button>
            </div>
        </div>

        <div id="statsBar">
            <div class="stat-box">Dist<span class="stat-val" id="dispDist">--</span>cm</div>
            <div class="stat-box">Taille<span class="stat-val" id="dispSizeMm">--</span>mm</div>
            <div class="stat-box">Vitesse<span class="stat-val" id="dispSpeed">0</span>°/s</div>
        </div>

        <div id="testBtnContainer" class="interactive">
            <button class="btn btn-test" onclick="manualTest()">TEST LETTER</button>
        </div>
    </div>

    <script>
        let model, video, letterEl;
        let acuity = 1.0;
        let distance = 50; // cm
        let pixelsPerCm = 56; // Valeur par défaut (écran standard)
        let lastPos = null;
        let lastTime = 0;
        let letters = ["H", "X", "O", "V", "U", "Z", "C", "E", "N", "R"];
        let lastFlash = 0;

        function startApp() {
            loadCalib();
            document.getElementById('startOverlay').style.display = 'none';
            initCamera();
        }

        function initCamera() {
            video = document.getElementById('video');
            letterEl = document.getElementById('letterDisplay');
            
            navigator.mediaDevices.getUserMedia({ video: { facingMode: 'user', width: 640, height: 480 } })
            .then(stream => {
                video.srcObject = stream;
                return video.play();
            })
            .then(() => blazeface.load())
            .then(loadedModel => {
                model = loadedModel;
                requestAnimationFrame(processFrame);
            })
            .catch(err => alert("Erreur caméra: " + err));
        }

        // --- CALIBRAGE ---
        function toggleCalib() {
            const c = document.getElementById('calibContainer');
            c.style.display = (c.style.display === 'block') ? 'none' : 'block';
        }

        function updateCalibPreview() {
            // Le slider définit directement la largeur en pixels de la barre
            pixelsPerCm = parseInt(document.getElementById('calibRange').value);
            document.getElementById('calibBar').style.width = pixelsPerCm + 'px';
            updateStats(); // Met à jour la taille estimée en temps réel
        }

        function saveCalib() {
            localStorage.setItem('avd_ppc_v2', pixelsPerCm);
            toggleCalib();
            toggleSettings();
            // Petit feedback visuel
            const btn = document.querySelector('#calibContainer button');
            const originalText = btn.innerText;
            btn.innerText = "SAUVEGARDÉ !";
            btn.style.background = "#28a745";
            setTimeout(() => {
                btn.innerText = originalText;
                btn.style.background = "";
            }, 1000);
        }

        function loadCalib() {
            const saved = localStorage.getItem('avd_ppc_v2');
            if (saved) {
                pixelsPerCm = parseInt(saved);
                document.getElementById('calibRange').value = pixelsPerCm;
                document.getElementById('calibBar').style.width = pixelsPerCm + 'px';
            }
        }

        // --- UI ---
        function toggleSettings() {
            const p = document.getElementById('settingsPanel');
            p.style.display = (p.style.display === 'block') ? 'none' : 'block';
        }

        function updateAcuity() {
            acuity = parseFloat(document.getElementById('acuityRange').value);
            document.getElementById('acuityVal').innerText = acuity.toFixed(1);
            updateStats();
        }

        // --- CALCUL TAILLE (Cœur du système) ---
        function getLetterSizePx(distCm) {
            // Formule optique : Taille(cm) = Distance(cm) * tan(5 minutes d'arc) / Acuité
            // tan(5') ≈ 0.0014544
            const sizeCm = (distCm * 0.0014544) / acuity;
            const sizePx = sizeCm * pixelsPerCm;
            return { px: Math.round(sizePx), mm: (sizeCm * 10).toFixed(1) };
        }

        function updateStats() {
            const data = getLetterSizePx(distance);
            document.getElementById('dispSizeMm').innerText = data.mm;
        }

        function showLetter() {
            const data = getLetterSizePx(distance);
            const letter = letters[Math.floor(Math.random() * letters.length)];
            
            letterEl.innerText = letter;
            letterEl.style.fontSize = data.px + 'px';
            letterEl.style.opacity = '1';
            
            console.log(`Affichage: ${letter}, Taille: ${data.px}px (${data.mm}mm) à ${distance}cm`);

            setTimeout(() => {
                letterEl.style.opacity = '0';
            }, 60); // 60ms d'affichage
        }

        function manualTest() {
            showLetter();
        }

        // --- BOUCLE VIDEO & DETECTION ---
        async function processFrame() {
            if (!model) return;

            const predictions = await model.estimateFaces(video, false);
            
            if (predictions.length > 0) {
                const face = predictions[0];
                const landmarks = face.landmarks;
                const nose = landmarks[2];
                const leftEye = landmarks[0];
                const rightEye = landmarks[1];

                // 1. Distance (basée sur l'écart inter-pupillaire moyen ~6.3cm)
                const distPx = Math.hypot(rightEye[0] - leftEye[0], rightEye[1] - leftEye[1]);
                if (distPx > 0) {
                    // Distance = (TailleRéelle * LargeurÉcranPx) / (TaillePx * ConstanteOptique)
                    // Simplification : Distance(cm) ≈ 6.3 * (LargeurVideoPx / distPx) * FacteurCorrection
                    // On utilise une approximation simple ici :
                    distance = (6.3 / distPx) * video.videoWidth * 0.6; // 0.6 est un facteur empirique pour la FOV
                    
                    // Bornes de sécurité
                    if (distance > 150) distance = 150;
                    if (distance < 20) distance = 20;
                    
                    document.getElementById('dispDist').innerText = Math.round(distance);
                    updateStats();
                }

                // 2. Vitesse (Déclenchement)
                const now = performance.now();
                if (lastPos) {
                    const dt = now - lastTime;
                    if (dt > 16) { // ~60fps
                        const dPx = Math.hypot(nose[0] - lastPos.x, nose[1] - lastPos.y);
                        const vPxSec = (dPx / dt) * 1000;
                        
                        // Conversion Pixels -> Degrés (Approximation FOV 60° sur la largeur)
                        const degPerPx = 60 / video.videoWidth;
                        const speed = vPxSec * degPerPx;
                        
                        document.getElementById('dispSpeed').innerText = Math.round(speed);

                        // Déclenchement si > 150°/s et cooldown de 1.5s
                        if (speed > 150 && (now - lastFlash > 1500)) {
                            showLetter();
                            lastFlash = now;
                        }
                    }
                }
                lastPos = { x: nose[0], y: nose[1] };
                lastTime = now;
            } else {
                document.getElementById('dispSpeed').innerText = "0";
            }
            
            requestAnimationFrame(processFrame);
        }
    </script>
</body>
</html>
