<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Test AV - Détection Avancée</title>
    <style>
        body {
            margin: 0;
            background: #000;
            overflow: hidden;
            font-family: sans-serif;
            color: white;
        }
        video {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 0.2;
            z-index: 1;
            transform: scaleX(-1);
        }
        #letterDisplay {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 100px;
            font-weight: bold;
            color: white;
            opacity: 0;
            z-index: 10;
            pointer-events: none;
            text-shadow: 0 0 10px black;
        }
        #ui {
            position: absolute;
            top: 10px;
            left: 10px;
            z-index: 20;
            background: rgba(0,0,0,0.8);
            padding: 10px;
            border-radius: 8px;
            max-width: 300px;
        }
        .stat {
            font-size: 12px;
            margin: 2px 0;
            color: #0f0;
            font-family: monospace;
        }
        .error {
            color: #f55;
            font-size: 14px;
            margin-top: 10px;
        }

        /* Jauge de vitesse */
        .speed-gauge {
            height: 6px;
            background: #333;
            margin-top: 5px;
            border-radius: 3px;
            overflow: hidden;
        }
        .speed-bar {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #0f0, #ff0, #f00);
            transition: width 0.1s linear;
        }

        button {
            background: #4ecdc4;
            border: none;
            padding: 10px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            width: 100%;
            margin-top: 5px;
        }
        button.secondary {
            background: #555;
            color: white;
        }
        #startOverlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000;
            z-index: 100;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 20px;
        }
        #calibPanel {
            display: none;
            margin-top: 10px;
            padding-top: 10px;
            border-top: 1px solid #444;
            text-align: center;
        }
        .calib-bar-container {
            height: 20px;
            border: 1px dashed #666;
            margin: 10px auto;
            display: flex;
            justify-content: center;
            align-items: center;
            width: 12mm;
        }
        .calib-bar {
            height: 100%;
            background: red;
            width: 10mm;
            transform-origin: center;
        }
    </style>
</head>
<body>

    <div id="startOverlay">
        <h1>Test Acuité (Pro)</h1>
        <p>Détection de vitesse optimisée.</p>
        <button onclick="startApp()">DÉMARRER</button>
        <p id="errorMsg" class="error"></p>
    </div>

    <video id="video" playsinline autoplay muted></video>
    <div id="letterDisplay">A</div>

    <div id="ui" style="display:none;">
        <div class="stat" id="statusInit">Initialisation...</div>
        <div class="stat" id="statusSpeed">Vitesse: 0</div>
        <!-- Jauge visuelle -->
        <div class="speed-gauge"><div class="speed-bar" id="speedBar"></div></div>

        <div class="stat" id="statusDist" style="margin-top:5px;">Distance: -- cm</div>
        <div class="stat" id="statusSize">Taille: -- px</div>

        <hr style="border-color:#333; margin: 5px 0;">

        <div style="font-size:11px; margin-bottom:5px;">
            Acuité: <span id="valAcuity">1.0</span>
            <input type="range" id="acuity" min="0.1" max="2.0" step="0.1" value="1.0" oninput="updateParams()" style="width:100%; margin:0;">
        </div>

        <button class="secondary" onclick="toggleCalib()">📏 Calibrer l'écran</button>

        <div id="calibPanel">
            <p style="font-size:11px; margin:0; color:#ddd;">Ajustez la barre rouge à <b>1 cm</b> avec une règle.</p>
            <div class="calib-bar-container">
                <div class="calib-bar" id="calibBar"></div>
            </div>
            <input type="range" id="calibSlider" min="0.5" max="2.0" step="0.05" value="1.0" oninput="updateCalib()" style="width:100%;">
            <button onclick="saveCalib()" style="background:#28a745; margin-top:5px;">Sauvegarder</button>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.11.0"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/blazeface@0.0.7"></script>

    <script>
        // =============================================
        // VARIABLES GLOBALES (UNIQUES)
        // =============================================
        let model = null;
        let video = document.getElementById('video');
        let letterEl = document.getElementById('letterDisplay');
        let ui = document.getElementById('ui');
        let overlay = document.getElementById('startOverlay');

        // Paramètres
        let acuity = 1.0;
        let screenDPI = 300;
        let calibrationFactor = 1.0;

        // Tracking
        let lastHeadPos = null;
        let lastTime = 0;
        let speed = 0;
        let smoothedSpeed = 0; // Vitesse lissée pour l'affichage
        let distance = 50;
        let rawDistance = 50;
        let state = 'IDLE';
        let lastFlashTime = 0;
        const letters = "C D F H L N O P T U V Z".split(" ");

        // =============================================
        // FONCTIONS DE CALIBRATION
        // =============================================
        function toggleCalib() {
            const panel = document.getElementById('calibPanel');
            panel.style.display = panel.style.display === 'none' ? 'block' : 'none';
        }

        function updateCalib() {
            calibrationFactor = parseFloat(document.getElementById('calibSlider').value);
            document.getElementById('calibBar').style.transform = `scaleX(${calibrationFactor})`;
        }

        function saveCalib() {
            localStorage.setItem('avd_blazeface_calib_v3', calibrationFactor);
            document.getElementById('calibPanel').style.display = 'none';
            updateStats();
        }

        function loadCalib() {
            const saved = localStorage.getItem('avd_blazeface_calib_v3');
            if (saved) {
                calibrationFactor = parseFloat(saved);
                document.getElementById('calibSlider').value = calibrationFactor;
                updateCalib();
            }
        }

        // =============================================
        // DÉMARRAGE DE L'APPLICATION
        // =============================================
        async function startApp() {
            loadCalib();
            try {
                // On force une résolution correcte pour la stabilité
                const stream = await navigator.mediaDevices.getUserMedia({
                    video: {
                        facingMode: 'user',
                        width: { ideal: 640 },
                        height: { ideal: 480 }
                    }
                });
                video.srcObject = stream;
                video.onloadedmetadata = async () => {
                    overlay.style.display = 'none';
                    ui.style.display = 'block';
                    video.play();
                    document.getElementById('statusInit').innerText = "Chargement IA...";

                    try {
                        model = await blazeface.load();
                        document.getElementById('statusInit').innerText = "Prêt !";

                        const dpr = window.devicePixelRatio || 1;
                        let baseDPI = dpr > 2 ? 450 : (dpr > 1 ? 300 : 150);
                        screenDPI = baseDPI * calibrationFactor;

                        // Réinitialisation des variables de tracking
                        lastHeadPos = null;
                        lastTime = 0;
                        speed = 0;
                        smoothedSpeed = 0;
                        distance = 50;
                        rawDistance = 50;
                        state = 'IDLE';
                        lastFlashTime = 0;

                        loop();
                    } catch (err) {
                        document.getElementById('errorMsg').innerText = "Erreur IA : " + err.message;
                        console.error("Erreur chargement Blazeface:", err);
                    }
                };
            } catch (err) {
                document.getElementById('errorMsg').innerText = "Erreur Caméra : " + err.message;
                console.error("Erreur accès caméra:", err);
            }
        }

        // =============================================
        // BOUCLE PRINCIPALE (CORRIGÉE)
        // =============================================
        async function loop() {
            if (!model) {
                // Si le modèle n'est pas chargé, on réessaye toutes les secondes
                setTimeout(loop, 1000);
                return;
            }

            try {
                const predictions = await model.estimateFaces(video, false);

                if (predictions.length > 0) {
                    const face = predictions[0];
                    const nose = face.landmarks[2]; // Nez (point le plus stable)
                    const leftEye = face.landmarks[0];
                    const rightEye = face.landmarks[1];

                    // 1. CALCUL DE LA DISTANCE
                    const distInterYeuxPx = Math.sqrt(
                        Math.pow(rightEye[0] - leftEye[0], 2) +
                        Math.pow(rightEye[1] - leftEye[1], 2)
                    );
                    const K_FACTOR = 2800;

                    if (distInterYeuxPx > 5) {
                        let calculatedDist = K_FACTOR / distInterYeuxPx;
                        rawDistance = calculatedDist;
                        // Lissage fort de la distance (elle ne change pas vite)
                        distance = (distance * 0.9) + (rawDistance * 0.1);
                        distance = Math.max(30, Math.min(120, distance));
                    }

                    // 2. CALCUL DE LA VITESSE (méthode vectorielle améliorée)
                    const now = performance.now();
                    if (lastHeadPos) {
                        const dt = now - lastTime; // ms

                        if (dt > 0) { // Évite la division par zéro
                            const dx = nose[0] - lastHeadPos.x;
                            const dy = nose[1] - lastHeadPos.y;
                            const distPx = Math.sqrt(dx*dx + dy*dy);

                            // Vitesse brute en px/ms
                            let rawSpeed = distPx / dt;

                            // Lissage de la vitesse (30% nouvelle valeur, 70% ancienne)
                            smoothedSpeed = (smoothedSpeed * 0.7) + (rawSpeed * 0.3);

                            // Conversion pour l'affichage (facteur * 1000 pour avoir des unités lisibles)
                            speed = smoothedSpeed * 1000;
                        }
                    }

                    // Mise à jour des variables pour le prochain cycle
                    lastHeadPos = { x: nose[0], y: nose[1] };
                    lastTime = now;

                    // Gestion de l'état (affichage de la lettre)
                    handleState(speed, now);
                } else {
                    // Si pas de visage détecté, on décroit la vitesse
                    smoothedSpeed = smoothedSpeed * 0.9;
                    speed = smoothedSpeed * 1000;
                }

                // Mise à jour des statistiques (toujours appelée)
                updateStats();

            } catch (err) {
                console.error("Erreur dans la boucle principale:", err);
                document.getElementById('errorMsg').innerText = "Erreur détection : " + err.message;
            }

            // On relance la boucle (60fps max)
            requestAnimationFrame(loop);
        }

        // =============================================
        // MACHINE D'ÉTAT POUR L'AFFICHAGE DE LA LETTRE
        // =============================================
        function handleState(currentSpeed, now) {
            const minSpeedTrigger = 150; // Seuil pour déclencher l'affichage
            const flashDuration = 60;    // Durée d'affichage de la lettre (ms)
            const cooldownDuration = 1000; // Temps minimum entre deux affichages

            if (state === 'IDLE') {
                if (currentSpeed > minSpeedTrigger && (now - lastFlashTime > cooldownDuration)) {
                    state = 'FLASH';
                    lastFlashTime = now;

                    // Choisir une lettre aléatoire
                    const randomLetter = letters[Math.floor(Math.random() * letters.length)];
                    letterEl.innerText = randomLetter;

                    // Calculer la taille de la lettre en fonction de la distance
                    const letterSize = calculateSize(distance, acuity);
                    letterEl.style.fontSize = letterSize + 'px';

                    // Afficher la lettre
                    letterEl.style.opacity = '1';

                    // Masquer la lettre après la durée spécifiée
                    setTimeout(() => {
                        if (state === 'FLASH') { // Vérification pour éviter les conflits
                            letterEl.style.opacity = '0';
                            state = 'IDLE';
                        }
                    }, flashDuration);
                }
            }
        }

        // =============================================
        // CALCUL DE LA TAILLE DE LA LETTRE
        // =============================================
        function calculateSize(distCm, acuityDecimal) {
            // Formule : (distance * constante) / acuité
            // La constante 0.0145 est un facteur empirique pour convertir cm en unités de lettre
            let heightCm = (distCm * 0.0145) / acuityDecimal;
            let heightPx = (heightCm / 2.54) * screenDPI; // Conversion cm -> pouces -> pixels
            return Math.max(20, Math.round(heightPx)); // Taille minimum de 20px
        }

        // =============================================
        // MISE À JOUR DES PARAMÈTRES ET STATISTIQUES
        // =============================================
        function updateParams() {
            acuity = parseFloat(document.getElementById('acuity').value);
            document.getElementById('valAcuity').innerText = acuity.toFixed(1);
        }

        function updateStats() {
            // Vitesse
            document.getElementById('statusSpeed').innerText = `Vitesse: ${Math.round(speed)}`;

            // Distance
            document.getElementById('statusDist').innerText = `Distance: ~${Math.round(distance)} cm`;

            // Taille de la lettre courante (même si invisible)
            let currentSize = calculateSize(distance, acuity);
            document.getElementById('statusSize').innerText = `Taille: ${currentSize} px`;

            // Mise à jour de la jauge de vitesse (0-250 px/s)
            let pct = Math.min(100, (speed / 250) * 100);
            document.getElementById('speedBar').style.width = `${pct}%`;

            // Changement de couleur de la jauge
            const bar = document.getElementById('speedBar');
            if (speed > 150) {
                bar.style.background = '#f00'; // Rouge si seuil atteint
            } else {
                bar.style.background = 'linear-gradient(90deg, #0f0, #ff0, #f00)';
            }
        }
    </script>
</body>
</html>
