<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg width="297mm" height="210mm" viewBox="0 0 297 210" xmlns="http://www.w3.org/2000/svg">
  <!-- Fond blanc -->
  <rect width="100%" height="100%" fill="white"/>

  <!-- Règle principale -->
  <g transform="translate(10, 100)">
    <!-- Ligne principale -->
    <line x1="0" y1="0" x2="277" y2="0" stroke="black" stroke-width="1"/>

    <!-- Graduations principales (1 cm) -->
    <g font-size="8" text-anchor="middle">
      <!-- 0 cm -->
      <line x1="0" y1="0" x2="0" y2="-5" stroke="black" stroke-width="1"/>
      <text x="0" y="-10">0</text>

      <!-- 1 cm -->
      <line x1="10" y1="0" x2="10" y2="-8" stroke="black" stroke-width="1"/>
      <text x="10" y="-10">1</text>

      <!-- 2 cm -->
      <line x1="20" y1="0" x2="20" y2="-8" stroke="black" stroke-width="1"/>
      <text x="20" y="-10">2</text>

      <!-- 3 cm -->
      <line x1="30" y1="0" x2="30" y2="-8" stroke="black" stroke-width="1"/>
      <text x="30" y="-10">3</text>

      <!-- 4 cm -->
      <line x1="40" y1="0" x2="40" y2="-8" stroke="black" stroke-width="1"/>
      <text x="40" y="-10">4</text>

      <!-- 5 cm -->
      <line x1="50" y1="0" x2="50" y2="-8" stroke="black" stroke-width="1"/>
      <text x="50" y="-10">5</text>

      <!-- 6 cm -->
      <line x1="60" y1="0" x2="60" y2="-8" stroke="black" stroke-width="1"/>
      <text x="60" y="-10">6</text>

      <!-- 7 cm -->
      <line x1="70" y1="0" x2="70" y2="-8" stroke="black" stroke-width="1"/>
      <text x="70" y="-10">7</text>

      <!-- 8 cm -->
      <line x1="80" y1="0" x2="80" y2="-8" stroke="black" stroke-width="1"/>
      <text x="80" y="-10">8</text>

      <!-- 9 cm -->
      <line x1="90" y1="0" x2="90" y2="-8" stroke="black" stroke-width="1"/>
      <text x="90" y="-10">9</text>

      <!-- 10 cm -->
      <line x1="100" y1="0" x2="100" y2="-10" stroke="black" stroke-width="1"/>
      <text x="100" y="-15">10</text>

      <!-- 15 cm -->
      <line x1="150" y1="0" x2="150" y2="-10" stroke="black" stroke-width="1"/>
      <text x="150" y="-15">15</text>

      <!-- 20 cm -->
      <line x1="200" y1="0" x2="200" y2="-10" stroke="black" stroke-width="1"/>
      <text x="200" y="-15">20</text>

      <!-- 25 cm -->
      <line x1="250" y1="0" x2="250" y2="-10" stroke="black" stroke-width="1"/>
      <text x="250" y="-15">25</text>

      <!-- 29 cm -->
      <line x1="290" y1="0" x2="290" y2="-8" stroke="black" stroke-width="1"/>
      <text x="290" y="-10">29</text>
    </g>

    <!-- Graduations secondaires (1 mm) -->
    <g stroke="black" stroke-width="0.5">
      <!-- De 0 à 10 cm -->
      <g transform="translate(0, 0)">
        <line x1="0" y1="0" x2="0" y2="-3"/>
        <line x1="1" y1="0" x2="1" y2="-3"/>
        <line x1="2" y1="0" x2="2" y2="-3"/>
        <line x1="3" y1="0" x2="3" y2="-3"/>
        <line x1="4" y1="0" x2="4" y2="-3"/>
        <line x1="5" y1="0" x2="5" y2="-3"/>
        <line x1="6" y1="0" x2="6" y2="-3"/>
        <line x1="7" y1="0" x2="7" y2="-3"/>
        <line x1="8" y1="0" x2="8" y2="-3"/>
        <line x1="9" y1="0" x2="9" y2="-3"/>
      </g>

      <!-- De 10 à 20 cm -->
      <g transform="translate(100, 0)">
        <line x1="0" y1="0" x2="0" y2="-3"/>
        <line x1="1" y1="0" x2="1" y2="-3"/>
        <line x1="2" y1="0" x2="2" y2="-3"/>
        <line x1="3" y1="0" x2="3" y2="-3"/>
        <line x1="4" y1="0" x2="4" y2="-3"/>
        <line x1="5" y1="0" x2="5" y2="-3"/>
        <line x1="6" y1="0" x2="6" y2="-3"/>
        <line x1="7" y1="0" x2="7" y2="-3"/>
        <line x1="8" y1="0" x2="8" y2="-3"/>
        <line x1="9" y1="0" x2="9" y2="-3"/>
      </g>

      <!-- De 20 à 29 cm -->
      <g transform="translate(200, 0)">
        <line x1="0" y1="0" x2="0" y2="-3"/>
        <line x1="1" y1="0" x2="1" y2="-3"/>
        <line x1="2" y1="0" x2="2" y2="-3"/>
        <line x1="3" y1="0" x2="3" y2="-3"/>
        <line x1="4" y1="0" x2="4" y2="-3"/>
        <line x1="5" y1="0" x2="5" y2="-3"/>
        <line x1="6" y1="0" x2="6" y2="-3"/>
        <line x1="7" y1="0" x2="7" y2="-3"/>
        <line x1="8" y1="0" x2="8" y2="-3"/>
        <line x1="9" y1="0" x2="9" y2="-3"/>
      </g>
    </g>
  </g>

  <!-- Titre -->
  <text x="148.5" y="195" font-size="12" text-anchor="middle" font-weight="bold">RÈGLE EN CENTIMÈTRES (0-29 cm)</text>
</svg>
