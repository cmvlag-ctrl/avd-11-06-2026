<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Test AV - Détection Avancée</title>
    <style>
        body {
            margin: 0;
            background: #000;
            overflow: hidden;
            font-family: sans-serif;
            color: white;
        }
        video {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 0.2;
            z-index: 1;
            transform: scaleX(-1);
        }

        /* Overlay de démarrage */
        #startOverlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            z-index: 10;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 20px;
        }

        #startTitle {
            font-size: 2em;
            color: #0f0;
        }

        .startButton {
            padding: 15px 30px;
            background: #333;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1.2em;
            cursor: pointer;
            transition: background 0.3s;
        }

        .startButton:hover {
            background: #555;
        }

        /* Jauge de vitesse */
        .speed-gauge {
            height: 6px;
            background: #333;
            margin-top: 5px;
            border-radius: 3px;
            overflow: hidden;
        }
        .speed-bar {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #0f0, #ff0, #f00);
            transition: width 0.1s;
        }

        /* Test d'acuité */
        #acuityOverlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.9);
            z-index: 20;
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 20px;
        }

        #acuityLetter {
            font-size: 200px;
            font-weight: bold;
            color: white;
            opacity: 0;
            transition: opacity 0.5s;
            text-shadow: 0 0 10px black;
        }

        #acuityFeedback {
            font-size: 1.5em;
            color: #0f0;
        }

        #acuityScore {
            font-size: 2em;
            color: #ff0;
            font-weight: bold;
        }

        #acuityDistance {
            font-size: 1.2em;
            color: #aaa;
        }

        #acuityInstructions {
            font-size: 1.2em;
            max-width: 80%;
            text-align: center;
        }
    </style>
</head>
<body>
    <video id="video" autoplay></video>

    <!-- Overlay de démarrage -->
    <div id="startOverlay">
        <h1 id="startTitle">Test AV - Détection Avancée</h1>
        <button id="startDynamicBtn" class="startButton">DÉMARRER (Mode Dynamique)</button>
        <button id="startAcuityBtn" class="startButton">👁️ Tester mon acuité visuelle</button>
    </div>

    <!-- Overlay du test d'acuité -->
    <div id="acuityOverlay">
        <div id="acuityInstructions">
            Regardez attentivement l'écran.<br>
            Une lettre apparaîtra brièvement.<br>
            Dites-moi quelle lettre vous avez vue.
        </div>
        <div id="acuityLetter"></div>
        <div id="acuityFeedback"></div>
        <div id="acuityDistance">Distance: Calcul en cours...</div>
        <div id="acuityScore"></div>
    </div>

    <!-- Jauge de vitesse (visible uniquement en mode dynamique) -->
    <div id="speedGaugeContainer" style="position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); width: 80%; max-width: 500px; display: none;">
        <div style="text-align: center; margin-bottom: 5px;">Vitesse détectée</div>
        <div class="speed-gauge">
            <div class="speed-bar" id="speedBar"></div>
        </div>
        <div style="text-align: center; margin-top: 5px;" id="speedValue">0 km/h</div>
    </div>

    <script>
        // =============================================
        // PARTIE DYNAMIQUE (INCHANGÉE)
        // =============================================

        // Variables pour le mode dynamique
        let video = document.getElementById('video');
        let speedBar = document.getElementById('speedBar');
        let speedValue = document.getElementById('speedValue');
        let speedGaugeContainer = document.getElementById('speedGaugeContainer');
        let startDynamicBtn = document.getElementById('startDynamicBtn');

        // Variables de calibration
        let calibrationDistance = 60; // Distance de calibration en cm
        let currentSpeed = 0;
        let minSpeedTrigger = 5; // Vitesse minimale pour déclencher un flash
        let cooldownDuration = 1000; // 1 seconde entre chaque flash
        let lastFlashTime = 0;
        let state = 'IDLE'; // IDLE, FLASH
        let now = 0;

        // Variables pour la détection faciale
        let distance = calibrationDistance;
        let screenDPI = 96; // Valeur par défaut, à ajuster si nécessaire

        // Lancer la caméra
        navigator.mediaDevices.getUserMedia({ video: true })
            .then(stream => {
                video.srcObject = stream;
            })
            .catch(err => {
                console.error("Erreur accès caméra:", err);
            });

        // Boucle principale (mode dynamique)
        function dynamicLoop() {
            now = Date.now();

            // Logique de détection de vitesse (simulée pour l'exemple)
            // Dans votre version, vous avez votre propre système de détection
            currentSpeed = Math.random() * 50 + 10; // Simulation

            // Mettre à jour la jauge
            let speedPercentage = Math.min(100, currentSpeed / 50 * 100);
            speedBar.style.width = speedPercentage + '%';
            speedValue.textContent = Math.round(currentSpeed) + ' km/h';

            // Logique de flash (simulée)
            if (state === 'IDLE') {
                if (currentSpeed > minSpeedTrigger && (now - lastFlashTime > cooldownDuration)) {
                    state = 'FLASH';
                    lastFlashTime = now;

                    // Flash visuel (simulé)
                    document.body.style.backgroundColor = '#f00';
                    setTimeout(() => {
                        document.body.style.backgroundColor = '#000';
                        state = 'IDLE';
                    }, 200);
                }
            }

            requestAnimationFrame(dynamicLoop);
        }

        // =============================================
        // PARTIE TEST D'ACUITÉ (CORRIGÉE)
        // =============================================

        // Variables pour le test d'acuité
        let acuityOverlay = document.getElementById('acuityOverlay');
        let acuityLetter = document.getElementById('acuityLetter');
        let acuityFeedback = document.getElementById('acuityFeedback');
        let acuityDistance = document.getElementById('acuityDistance');
        let acuityScore = document.getElementById('acuityScore');
        let startAcuityBtn = document.getElementById('startAcuityBtn');

        let acuityTestActive = false;
        let currentTestIndex = 0;
        let totalTests = 10;
        let testSequence = [];
        let currentAcuityTestLetter = '';
        let letterFlashTimeout;
        let acuity = 1.0; // Acuité par défaut (1.0 = vision normale)

        // Initialiser la séquence de test
        function initAcuityTest() {
            const letters = 'ABCDEFGHJKLMNPRSTUVWXYZ';
            testSequence = [];
            for (let i = 0; i < totalTests; i++) {
                testSequence.push(letters[Math.floor(Math.random() * letters.length)]);
            }
        }

        // Calculer la taille de la lettre (même fonction que le mode dynamique)
        function calculateSize(distCm, acuityDecimal) {
            // Taille en cm pour une acuité de 1.0 à 1m
            let heightCm = (distCm * 0.0145) / acuityDecimal;
            // Conversion en pixels (1 pouce = 2.54 cm)
            let heightPx = (heightCm / 2.54) * screenDPI;
            return Math.max(20, Math.round(heightPx));
        }

        // Afficher la lettre suivante avec la bonne taille
        function showNextAcuityLetter() {
            if (!acuityTestActive) return;

            // Vérifier si on a terminé le test
            if (currentTestIndex >= totalTests) {
                endAcuityTest();
                return;
            }

            // Récupérer la lettre suivante
            currentAcuityTestLetter = testSequence[currentTestIndex];

            // Calculer la taille de la lettre en fonction de la distance et de l'acuité
            const letterSizePx = calculateSize(distance, acuity);

            // Afficher la lettre avec la bonne taille
            acuityLetter.innerText = currentAcuityTestLetter;
            acuityLetter.style.fontSize = letterSizePx + 'px';
            acuityLetter.style.opacity = '1';

            // Masquer après 500ms
            letterFlashTimeout = setTimeout(() => {
                acuityLetter.style.opacity = '0';

                // Attendre 1 seconde avant de demander la réponse
                setTimeout(() => {
                    askForAcuityAnswer();
                }, 1000);
            }, 500);
        }

        // Demander la réponse de l'utilisateur
        function askForAcuityAnswer() {
            const userAnswer = prompt("Quelle lettre avez-vous vue ? (Majuscule)");
            checkAcuityAnswer(userAnswer);
        }

        // Vérifier la réponse
        function checkAcuityAnswer(userAnswer) {
            if (userAnswer === currentAcuityTestLetter) {
                acuityFeedback.textContent = "✅ Correct !";
                acuityFeedback.style.color = "#0f0";
            } else {
                acuityFeedback.textContent = `❌ Faux ! La lettre était ${currentAcuityTestLetter}`;
                acuityFeedback.style.color = "#f55";
            }

            // Passer à la lettre suivante
            currentTestIndex++;
            setTimeout(showNextAcuityLetter, 1500);
        }

        // Terminer le test d'acuité
        function endAcuityTest() {
            acuityTestActive = false;
            acuityOverlay.style.display = 'none';
            acuityFeedback.textContent = '';
            acuityScore.textContent = `Votre acuité visuelle: ${Math.round((currentTestIndex / totalTests) * 10)}/10`;
            acuityScore.style.color = "#ff0";

            // Retour au menu après 3 secondes
            setTimeout(() => {
                acuityScore.textContent = '';
                document.getElementById('startOverlay').style.display = 'flex';
            }, 3000);
        }

        // Lancer le test d'acuité
        function startAcuityTest() {
            document.getElementById('startOverlay').style.display = 'none';
            acuityOverlay.style.display = 'flex';
            acuityTestActive = true;
            currentTestIndex = 0;
            acuityFeedback.textContent = 'Prêt ?';
            acuityFeedback.style.color = "#0f0";
            initAcuityTest();
            showNextAcuityLetter();
        }

        // =============================================
        // GESTION DES BOUTONS
        // =============================================

        startDynamicBtn.addEventListener('click', () => {
            document.getElementById('startOverlay').style.display = 'none';
            speedGaugeContainer.style.display = 'block';
            dynamicLoop(); // Lancer la boucle principale
        });

        startAcuityBtn.addEventListener('click', startAcuityTest);

        // =============================================
        // DÉTECTION DE LA DISTANCE (simulée pour l'exemple)
        // =============================================

        // Dans votre version, vous avez votre propre système de détection de distance
        // Voici un exemple simulé qui change la distance toutes les 3 secondes
        setInterval(() => {
            distance = 50 + Math.random() * 30; // Distance aléatoire entre 50cm et 80cm
            acuityDistance.textContent = `Distance: ${Math.round(distance)} cm`;
        }, 3000);
    </script>
</body>
</html>
