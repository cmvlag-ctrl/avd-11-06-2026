<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test d'Acuité Flashée - Version Minimaliste</title>
    <style>
        body {
            margin: 0;
            background: #000;
            font-family: Arial, sans-serif;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            text-align: center;
        }
        #testContainer {
            width: 100%;
            max-width: 800px;
            padding: 20px;
        }
        #letterDisplay {
            font-size: 200px;
            color: white;
            text-shadow: 0 0 20px white;
            opacity: 0;
            transition: opacity 0.1s linear;
            margin: 20px 0;
            font-weight: bold;
        }
        #prompt {
            font-size: 24px;
            margin: 20px 0;
            min-height: 60px;
        }
        #validationButtons {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 10px;
            margin: 20px 0;
        }
        .letterButton {
            background: #4ecdc4;
            border: none;
            padding: 15px 20px;
            font-size: 24px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            min-width: 60px;
        }
        .letterButton:hover {
            background: #45b7b8;
        }
        #results {
            margin-top: 20px;
            font-size: 20px;
            min-height: 100px;
        }
        #startButton {
            background: #4CAF50;
            border: none;
            padding: 15px 30px;
            font-size: 20px;
            border-radius: 8px;
            cursor: pointer;
            margin-bottom: 20px;
        }
        #sizeInfo {
            font-size: 18px;
            margin: 10px 0;
            color: #ffeb3b;
        }
        #errorsInfo {
            font-size: 18px;
            margin: 10px 0;
            color: #f44336;
        }
    </style>
</head>
<body>
    <div id="testContainer">
        <h1>Test d'Acuité Visuelle Flashée</h1>
        <p>Test minimaliste : lettres flashées en blanc sur fond noir</p>

        <button id="startButton">DÉMARRER LE TEST</button>

        <div id="sizeInfo">Taille actuelle : 200 px</div>
        <div id="errorsInfo">Erreurs consécutives : 0</div>

        <div id="letterDisplay"></div>

        <div id="prompt">Préparez-vous...</div>

        <div id="validationButtons" style="display: none;">
            <!-- Boutons générés dynamiquement -->
        </div>

        <div id="results"></div>
    </div>

    <script>
        // Configuration
        const FLASH_DURATION = 60; // ms
        const MIN_FONT_SIZE = 20; // Taille minimale des lettres (px)
        const MAX_FONT_SIZE = 400; // Taille maximale des lettres (px)
        const SIZE_ADJUSTMENT = 0.9; // Réduction de taille après bonne réponse
        const SIZE_INCREASE = 1.1; // Augmentation de taille après mauvaise réponse

        // Variables globales
        let currentFontSize = 200; // Taille de départ (px)
        let errorsInRow = 0;
        let currentLetter = '';
        let isTestRunning = false;
        let startButton, letterDisplay, prompt, validationButtons, sizeInfo, errorsInfo, resultsDiv;

        // Lettres disponibles
        const letters = ['A', 'B', 'C', 'D', 'E', 'F', 'H', 'K', 'L', 'M', 'N', 'O', 'P', 'R', 'S', 'T', 'U', 'V', 'X', 'Z'];

        // Initialisation
        document.addEventListener('DOMContentLoaded', () => {
            startButton = document.getElementById('startButton');
            letterDisplay = document.getElementById('letterDisplay');
            prompt = document.getElementById('prompt');
            validationButtons = document.getElementById('validationButtons');
            sizeInfo = document.getElementById('sizeInfo');
            errorsInfo = document.getElementById('errorsInfo');
            resultsDiv = document.getElementById('results');

            // Configurer le bouton de démarrage
            startButton.addEventListener('click', startTest);

            // Initialiser les boutons de validation
            setupValidationButtons();
        });

        // Démarrer le test
        function startTest() {
            startButton.disabled = true;
            prompt.textContent = "Test en cours...";

            // Réinitialiser les variables
            currentFontSize = 200;
            errorsInRow = 0;
            updateInfoDisplays();

            // Réinitialiser l'affichage
            resultsDiv.innerHTML = '';
            letterDisplay.style.opacity = '0';

            isTestRunning = true;
            showNextLetter();
        }

        // Mettre à jour les affichages d'information
        function updateInfoDisplays() {
            sizeInfo.textContent = `Taille actuelle : ${currentFontSize} px`;
            errorsInfo.textContent = `Erreurs consécutives : ${errorsInRow}`;
        }

        // Afficher la prochaine lettre
        function showNextLetter() {
            if (!isTestRunning) return;

            // Générer une lettre aléatoire
            currentLetter = letters[Math.floor(Math.random() * letters.length)];

            // Afficher la lettre
            letterDisplay.textContent = currentLetter;
            letterDisplay.style.fontSize = `${currentFontSize}px`;
            letterDisplay.style.opacity = '1';

            // Masquer après 60ms
            setTimeout(() => {
                letterDisplay.style.opacity = '0';

                // Afficher les boutons de validation après le flash
                setTimeout(() => {
                    if (isTestRunning) {
                        validationButtons.style.display = 'flex';
                        prompt.textContent = "Quelle lettre avez-vous vue ?";
                    }
                }, 10);
            }, FLASH_DURATION);
        }

        // Configurer les boutons de validation
        function setupValidationButtons() {
            validationButtons.innerHTML = '';
            letters.forEach(letter => {
                const button = document.createElement('button');
                button.className = 'letterButton';
                button.textContent = letter;
                button.addEventListener('click', () => validateAnswer(letter));
                validationButtons.appendChild(button);
            });
        }

        // Valider la réponse
        function validateAnswer(selectedLetter) {
            validationButtons.style.display = 'none';

            if (selectedLetter === currentLetter) {
                // Bonne réponse
                letterDisplay.style.color = '#4CAF50';
                letterDisplay.textContent = '✓';
                errorsInRow = 0;

                // Réduire la taille pour la prochaine lettre
                currentFontSize = Math.max(MIN_FONT_SIZE, Math.round(currentFontSize * SIZE_ADJUSTMENT));
                console.log(`Bonne réponse! Taille réduite à ${currentFontSize}px`);
            } else {
                // Mauvaise réponse
                letterDisplay.style.color = '#F44336';
                letterDisplay.textContent = '✗';
                errorsInRow++;

                // Si 3 erreurs consécutives, arrêter le test
                if (errorsInRow >= 3) {
                    endTest();
                    return;
                }

                // Augmenter la taille pour la prochaine lettre
                currentFontSize = Math.min(MAX_FONT_SIZE, Math.round(currentFontSize * SIZE_INCREASE));
                console.log(`Mauvaise réponse! Taille augmentée à ${currentFontSize}px`);
            }

            // Mettre à jour les affichages
            updateInfoDisplays();

            // Attendre 1 seconde avant la prochaine lettre
            setTimeout(() => {
                letterDisplay.style.color = 'white';
                showNextLetter();
            }, 1000);
        }

        // Arrêter le test
        function endTest() {
            isTestRunning = false;
            prompt.textContent = "TEST TERMINÉ";

            // Afficher les résultats
            const acuityScore = calculateAcuityScore();
            resultsDiv.innerHTML = `
                <h2>Résultats</h2>
                <p>Taille minimale atteinte : ${currentFontSize} px</p>
                <p>Acuité visuelle estimée : ${acuityScore.toFixed(2)}/1.0</p>
                <p>Erreurs consécutives : ${errorsInRow}</p>
            `;

            // Évaluation de l'acuité
            let evaluation = '';
            if (acuityScore >= 0.8) evaluation = "Excellente";
            else if (acuityScore >= 0.6) evaluation = "Bonne";
            else if (acuityScore >= 0.4) evaluation = "Moyenne";
            else evaluation = "Faible";

            resultsDiv.innerHTML += `<p>Évaluation : ${evaluation}</p>`;

            // Réactiver le bouton de démarrage
            startButton.disabled = false;
        }

        // Calculer le score d'acuité
        function calculateAcuityScore() {
            return Math.min(1.0, MAX_FONT_SIZE / currentFontSize);
        }
    </script>
</body>
</html>
