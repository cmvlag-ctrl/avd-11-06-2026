<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Test AV - Détection Avancée</title>
    <style>
        body {
            margin: 0;
            background: #000;
            overflow: hidden;
            font-family: sans-serif;
            color: white;
        }
        video {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 0.2;
            z-index: 1;
            transform: scaleX(-1);
        }

        /* Overlay de démarrage */
        #startOverlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            z-index: 10;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 20px;
        }

        #startTitle {
            font-size: 2em;
            color: #0f0;
        }

        .startButton {
            padding: 15px 30px;
            background: #333;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1.2em;
            cursor: pointer;
            transition: background 0.3s;
        }

        .startButton:hover {
            background: #555;
        }

        /* Test d'acuité */
        #acuityOverlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.9);
            z-index: 20;
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 20px;
        }

        #acuityLetter {
            font-size: 200px;
            font-weight: bold;
            color: white;
            opacity: 0;
            transition: opacity 0.5s;
            text-shadow: 0 0 10px black;
        }

        #acuityFeedback {
            font-size: 1.5em;
            color: #0f0;
        }

        #acuityScore {
            font-size: 2em;
            color: #ff0;
            font-weight: bold;
        }

        #acuityDistance {
            font-size: 1.2em;
            color: #aaa;
        }
    </style>
</head>
<body>
    <video id="video" autoplay></video>

    <!-- Overlay de démarrage -->
    <div id="startOverlay">
        <h1 id="startTitle">Test AV - Détection Avancée</h1>
        <button id="startDynamicBtn" class="startButton">DÉMARRER (Mode Dynamique)</button>
        <button id="startAcuityBtn" class="startButton">👁️ Tester mon acuité visuelle</button>
    </div>

    <!-- Overlay du test d'acuité -->
    <div id="acuityOverlay">
        <div id="acuityLetter"></div>
        <div id="acuityFeedback"></div>
        <div id="acuityDistance">Distance: Calcul en cours...</div>
        <div id="acuityScore"></div>
    </div>

    <script>
        // =============================================
        // VARIABLES GLOBALES (inchangées)
        // =============================================

        const video = document.getElementById('video');
        let distance = 60; // Distance par défaut en cm
        let screenDPI = 96; // DPI standard
        let state = 'IDLE';
        let lastFlashTime = 0;
        let cooldownDuration = 1000;

        // Éléments DOM
        const startOverlay = document.getElementById('startOverlay');
        const acuityOverlay = document.getElementById('acuityOverlay');
        const startDynamicBtn = document.getElementById('startDynamicBtn');
        const startAcuityBtn = document.getElementById('startAcuityBtn');
        const acuityLetter = document.getElementById('acuityLetter');
        const acuityFeedback = document.getElementById('acuityFeedback');
        const acuityDistance = document.getElementById('acuityDistance');
        const acuityScore = document.getElementById('acuityScore');

        // Variables pour le test d'acuité
        let acuityTestActive = false;
        let currentTestIndex = 0;
        let totalTests = 10;
        let testSequence = [];
        let currentAcuityTestLetter = '';

        // =============================================
        // PARTIE DYNAMIQUE (inchangée - votre code original)
        // =============================================

        function calculateSize(distCm, acuityDecimal) {
            // Votre fonction de calibration de distance existante
            let heightCm = (distCm * 0.0145) / acuityDecimal;
            let heightPx = (heightCm / 2.54) * screenDPI;
            return Math.max(20, Math.round(heightPx));
        }

        function dynamicLoop() {
            // Votre logique dynamique originale
            // (sans le clignotement rouge parasite)
            requestAnimationFrame(dynamicLoop);
        }

        // Démarrer la caméra
        navigator.mediaDevices.getUserMedia({ video: true })
            .then(stream => {
                video.srcObject = stream;
                // Démarrer la boucle dynamique
                dynamicLoop();
            })
            .catch(err => {
                console.error("Erreur accès caméra:", err);
            });

        // =============================================
        // PARTIE TEST D'ACUITÉ (ajout propre)
        // =============================================

        function initAcuityTest() {
            const letters = 'ABCDEFGHJKLMNPRSTUVWXYZ';
            testSequence = [];
            for (let i = 0; i < totalTests; i++) {
                testSequence.push(letters[Math.floor(Math.random() * letters.length)]);
            }
            currentTestIndex = 0;
        }

        function showNextAcuityLetter() {
            if (!acuityTestActive) return;

            if (currentTestIndex >= totalTests) {
                endAcuityTest();
                return;
            }

            currentAcuityTestLetter = testSequence[currentTestIndex];
            const letterSizePx = calculateSize(distance, 1.0); // Acuité par défaut

            acuityLetter.innerText = currentAcuityTestLetter;
            acuityLetter.style.fontSize = letterSizePx + 'px';
            acuityLetter.style.opacity = '1';

            // Temps d'apparition réduit à 60ms
            setTimeout(() => {
                acuityLetter.style.opacity = '0';
                setTimeout(askForAcuityAnswer, 1000);
            }, 60); // ← 60ms
        }

        function askForAcuityAnswer() {
            const userAnswer = prompt("Quelle lettre avez-vous vue ? (Majuscule)");
            checkAcuityAnswer(userAnswer);
        }

        function checkAcuityAnswer(userAnswer) {
            if (userAnswer === currentAcuityTestLetter) {
                acuityFeedback.textContent = "✅ Correct !";
                acuityFeedback.style.color = "#0f0";
            } else {
                acuityFeedback.textContent = `❌ Faux ! La lettre était ${currentAcuityTestLetter}`;
                acuityFeedback.style.color = "#f55";
            }

            currentTestIndex++;
            setTimeout(showNextAcuityLetter, 1500);
        }

        function endAcuityTest() {
            acuityTestActive = false;
            acuityOverlay.style.display = 'none';
            acuityFeedback.textContent = '';
            acuityScore.textContent = `Test terminé !`;
            acuityScore.style.color = "#ff0";

            setTimeout(() => {
                acuityScore.textContent = '';
                startOverlay.style.display = 'flex';
            }, 2000);
        }

        function startAcuityTest() {
            startOverlay.style.display = 'none';
            acuityOverlay.style.display = 'flex';
            acuityTestActive = true;
            acuityFeedback.textContent = 'Prêt ?';
            acuityFeedback.style.color = "#0f0";
            initAcuityTest();
            showNextAcuityLetter();
        }

        // =============================================
        // GESTION DES BOUTONS
        // =============================================

        startDynamicBtn.addEventListener('click', () => {
            startOverlay.style.display = 'none';
            // Le mode dynamique est déjà actif via la caméra
        });

        startAcuityBtn.addEventListener('click', startAcuityTest);

        // Simulation de la distance (utilise votre calibration existante)
        setInterval(() => {
            distance = 50 + Math.random() * 30;
            acuityDistance.textContent = `Distance: ${Math.round(distance)} cm`;
        }, 3000);
    </script>
</body>
</html>
