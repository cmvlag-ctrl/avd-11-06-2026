<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test d'Acuité Flashée - Avec Calibration de Distance</title>
    <script src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js"></script>
    <style>
        body {
            margin: 0;
            background: #000;
            font-family: Arial, sans-serif;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            text-align: center;
        }
        #testContainer {
            width: 100%;
            max-width: 800px;
            padding: 20px;
        }
        #letterDisplay {
            font-size: 200px;
            color: white;
            text-shadow: 0 0 20px white;
            opacity: 0;
            transition: opacity 0.1s linear;
            margin: 20px 0;
            font-weight: bold;
        }
        #prompt {
            font-size: 24px;
            margin: 20px 0;
            min-height: 60px;
        }
        #validationButtons {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 10px;
            margin: 20px 0;
        }
        .letterButton {
            background: #4ecdc4;
            border: none;
            padding: 15px 20px;
            font-size: 24px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            min-width: 60px;
        }
        .letterButton:hover {
            background: #45b7b8;
        }
        #results {
            margin-top: 20px;
            font-size: 20px;
            min-height: 100px;
        }
        #startButton {
            background: #4CAF50;
            border: none;
            padding: 15px 30px;
            font-size: 20px;
            border-radius: 8px;
            cursor: pointer;
            margin-bottom: 20px;
        }
        #infoDisplay {
            font-size: 18px;
            margin: 10px 0;
            color: #ffeb3b;
        }
        #distanceInfo {
            color: #4CAF50;
        }
        #sizeInfo {
            color: #2196F3;
        }
        #errorsInfo {
            color: #f44336;
        }
        #loading {
            font-size: 24px;
            margin: 20px 0;
        }
    </style>
</head>
<body>
    <div id="testContainer">
        <h1>Test d'Acuité Visuelle Flashée</h1>
        <p>Calibration automatique de distance + ajustement dynamique</p>

        <button id="startButton">DÉMARRER LE TEST (autorisez la caméra)</button>

        <div id="loading" style="display: none;">Chargement de la détection faciale...</div>

        <div id="infoDisplay">
            <div id="distanceInfo">Distance : -- cm</div>
            <div id="sizeInfo">Taille : -- px</div>
            <div id="errorsInfo">Erreurs : 0</div>
        </div>

        <div id="letterDisplay"></div>

        <div id="prompt">Préparez-vous...</div>

        <div id="validationButtons" style="display: none;">
            <!-- Boutons générés dynamiquement -->
        </div>

        <div id="results"></div>
    </div>

    <script>
        // Configuration
        const FLASH_DURATION = 60; // ms
        const MIN_FONT_SIZE = 20; // Taille minimale des lettres (px)
        const MAX_FONT_SIZE = 400; // Taille maximale des lettres (px)
        const TARGET_DISTANCE = 50; // Distance cible en cm (pour calibration)
        const SIZE_ADJUSTMENT = 0.9; // Réduction de taille après bonne réponse
        const SIZE_INCREASE = 1.1; // Augmentation de taille après mauvaise réponse
        const REFERENCE_SIZE = 150; // Taille de référence à 50cm (px)

        // Variables globales
        let currentFontSize = REFERENCE_SIZE;
        let errorsInRow = 0;
        let currentLetter = '';
        let isTestRunning = false;
        let faceMatcher;
        let videoWidth = 640, videoHeight = 480;
        let distance = 0;

        // Lettres disponibles
        const letters = ['A', 'B', 'C', 'D', 'E', 'F', 'H', 'K', 'L', 'M', 'N', 'O', 'P', 'R', 'S', 'T', 'U', 'V', 'X', 'Z'];

        // Éléments DOM
        let startButton, letterDisplay, prompt, validationButtons, distanceInfo, sizeInfo, errorsInfo, resultsDiv, loadingDiv;

        // Initialisation
        document.addEventListener('DOMContentLoaded', () => {
            startButton = document.getElementById('startButton');
            letterDisplay = document.getElementById('letterDisplay');
            prompt = document.getElementById('prompt');
            validationButtons = document.getElementById('validationButtons');
            distanceInfo = document.getElementById('distanceInfo');
            sizeInfo = document.getElementById('sizeInfo');
            errorsInfo = document.getElementById('errorsInfo');
            resultsDiv = document.getElementById('results');
            loadingDiv = document.getElementById('loading');

            // Configurer le bouton de démarrage
            startButton.addEventListener('click', startCalibration);

            // Initialiser les boutons de validation
            setupValidationButtons();
        });

        // Démarrer la calibration
        async function startCalibration() {
            startButton.style.display = 'none';
            loadingDiv.style.display = 'block';
            prompt.textContent = "Chargement de la détection faciale...";

            try {
                // Charger les modèles de face-api
                await loadModels();
                await setupCamera();

                // Démarrer la détection
                detectFaces();
                loadingDiv.style.display = 'none';
                prompt.textContent = "Placez votre visage à 50 cm de la caméra...";

                // Après 5 secondes, démarrer le test
                setTimeout(startTest, 5000);
            } catch (error) {
                console.error("Erreur:", error);
                prompt.textContent = "Erreur de chargement. Veuillez réessayer.";
                startButton.style.display = 'block';
                loadingDiv.style.display = 'none';
            }
        }

        // Charger les modèles de face-api
        async function loadModels() {
            await faceapi.nets.tinyFaceDetector.loadFromUri('https://justadudewhohacks.github.io/face-api.js/models');
            await faceapi.nets.faceLandmark68Net.loadFromUri('https://justadudewhohacks.github.io/face-api.js/models');
            await faceapi.nets.faceRecognitionNet.loadFromUri('https://justadudewhohacks.github.io/face-api.js/models');
        }

        // Configurer la caméra
        async function setupCamera() {
            const video = document.createElement('video');
            video.width = videoWidth;
            video.height = videoHeight;
            video.style.display = 'none';

            const stream = await navigator.mediaDevices.getUserMedia({ video: true });
            video.srcObject = stream;

            // Attendre que la vidéo soit prête
            await new Promise((resolve) => {
                video.onloadedmetadata = () => {
                    resolve();
                };
            });

            document.body.appendChild(video);
        }

        // Détecter les visages en continu
        function detectFaces() {
            const video = document.querySelector('video');
            if (!video) return;

            setInterval(async () => {
                if (!video.paused && !video.ended) {
                    const detections = await faceapi.detectAllFaces(video, new faceapi.TinyFaceDetectorOptions())
                        .withFaceLandmarks();

                    if (detections.length > 0) {
                        // Calculer la distance (simplifié)
                        const faceWidth = detections[0].box.width;
                        const faceHeight = detections[0].box.height;

                        // Estimation de la distance (formule empirique)
                        // Plus le visage est petit, plus on est loin
                        distance = Math.round((REFERENCE_SIZE * 50) / faceWidth);

                        // Mettre à jour l'affichage
                        distanceInfo.textContent = `Distance : ${distance} cm`;

                        // Calculer la taille adaptée
                        const sizeRatio = distance / TARGET_DISTANCE;
                        currentFontSize = Math.max(MIN_FONT_SIZE, Math.min(MAX_FONT_SIZE, Math.round(REFERENCE_SIZE * sizeRatio)));

                        sizeInfo.textContent = `Taille : ${currentFontSize} px`;
                    }
                }
            }, 500);
        }

        // Démarrer le test
        function startTest() {
            prompt.textContent = "Test en cours...";

            // Réinitialiser les variables
            errorsInRow = 0;
            updateInfoDisplays();

            // Réinitialiser l'affichage
            resultsDiv.innerHTML = '';
            letterDisplay.style.opacity = '0';

            isTestRunning = true;
            showNextLetter();
        }

        // Mettre à jour les affichages d'information
        function updateInfoDisplays() {
            errorsInfo.textContent = `Erreurs : ${errorsInRow}`;
        }

        // Afficher la prochaine lettre
        function showNextLetter() {
            if (!isTestRunning) return;

            // Générer une lettre aléatoire
            currentLetter = letters[Math.floor(Math.random() * letters.length)];

            // Afficher la lettre
            letterDisplay.textContent = currentLetter;
            letterDisplay.style.fontSize = `${currentFontSize}px`;
            letterDisplay.style.opacity = '1';

            // Masquer après 60ms
            setTimeout(() => {
                letterDisplay.style.opacity = '0';

                // Afficher les boutons de validation après le flash
                setTimeout(() => {
                    if (isTestRunning) {
                        validationButtons.style.display = 'flex';
                        prompt.textContent = "Quelle lettre avez-vous vue ?";
                    }
                }, 10);
            }, FLASH_DURATION);
        }

        // Configurer les boutons de validation
        function setupValidationButtons() {
            validationButtons.innerHTML = '';
            letters.forEach(letter => {
                const button = document.createElement('button');
                button.className = 'letterButton';
                button.textContent = letter;
                button.addEventListener('click', () => validateAnswer(letter));
                validationButtons.appendChild(button);
            });
        }

        // Valider la réponse
        function validateAnswer(selectedLetter) {
            validationButtons.style.display = 'none';

            if (selectedLetter === currentLetter) {
                // Bonne réponse
                letterDisplay.style.color = '#4CAF50';
                letterDisplay.textContent = '✓';
                errorsInRow = 0;

                // Réduire la taille pour la prochaine lettre
                currentFontSize = Math.max(MIN_FONT_SIZE, Math.round(currentFontSize * SIZE_ADJUSTMENT));
                console.log(`Bonne réponse! Taille réduite à ${currentFontSize}px`);
            } else {
                // Mauvaise réponse
                letterDisplay.style.color = '#F44336';
                letterDisplay.textContent = '✗';
                errorsInRow++;

                // Si 3 erreurs consécutives, arrêter le test
                if (errorsInRow >= 3) {
                    endTest();
                    return;
                }

                // Augmenter la taille pour la prochaine lettre
                currentFontSize = Math.min(MAX_FONT_SIZE, Math.round(currentFontSize * SIZE_INCREASE));
                console.log(`Mauvaise réponse! Taille augmentée à ${currentFontSize}px`);
            }

            // Mettre à jour les affichages
            sizeInfo.textContent = `Taille : ${currentFontSize} px`;
            errorsInfo.textContent = `Erreurs : ${errorsInRow}`;

            // Attendre 1 seconde avant la prochaine lettre
            setTimeout(() => {
                letterDisplay.style.color = 'white';
                showNextLetter();
            }, 1000);
        }

        // Arrêter le test
        function endTest() {
            isTestRunning = false;
            prompt.textContent = "TEST TERMINÉ";

            // Afficher les résultats
            const acuityScore = calculateAcuityScore();
            resultsDiv.innerHTML = `
                <h2>Résultats</h2>
                <p>Distance utilisée : ${distance} cm</p>
                <p>Taille minimale atteinte : ${currentFontSize} px</p>
                <p>Acuité visuelle estimée : ${acuityScore.toFixed(2)}/1.0</p>
                <p>Erreurs consécutives : ${errorsInRow}</p>
            `;

            // Évaluation de l'acuité
            let evaluation = '';
            if (acuityScore >= 0.8) evaluation = "Excellente";
            else if (acuityScore >= 0.6) evaluation = "Bonne";
            else if (acuityScore >= 0.4) evaluation = "Moyenne";
            else evaluation = "Faible";

            resultsDiv.innerHTML += `<p>Évaluation : ${evaluation}</p>`;

            // Arrêter la caméra
            const video = document.querySelector('video');
            if (video && video.srcObject) {
                video.srcObject.getTracks().forEach(track => track.stop());
            }
        }

        // Calculer le score d'acuité
        function calculateAcuityScore() {
            return Math.min(1.0, REFERENCE_SIZE / currentFontSize);
        }
    </script>
</body>
</html>
