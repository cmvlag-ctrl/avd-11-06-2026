<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test AV Flashé - Version Fonctionnelle</title>
    <style>
        body {
            margin: 0;
            background: #000;
            font-family: Arial, sans-serif;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            text-align: center;
        }
        #videoContainer {
            position: relative;
            margin-bottom: 20px;
            border: 2px solid #4ecdc4;
            border-radius: 10px;
            overflow: hidden;
            width: 320px;
            height: 240px;
        }
        #video {
            width: 100%;
            transform: scaleX(-1); /* Miroir */
        }
        #letterDisplay {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 200px;
            font-weight: bold;
            color: white;
            text-shadow: 0 0 20px #fff;
            opacity: 0;
            transition: opacity 0.1s linear;
            pointer-events: none;
        }
        #prompt {
            font-size: 20px;
            margin: 20px 0;
            min-height: 60px;
        }
        #validationButtons {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 10px;
            margin: 20px 0;
        }
        .letterButton {
            background: #4ecdc4;
            border: none;
            padding: 15px 20px;
            font-size: 24px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            min-width: 60px;
        }
        .letterButton:hover {
            background: #45b7b8;
        }
        #stats {
            font-size: 18px;
            margin: 20px 0;
            background: rgba(0,0,0,0.5);
            padding: 15px;
            border-radius: 8px;
        }
        #startButton {
            background: #4ecdc4;
            border: none;
            padding: 15px 30px;
            font-size: 20px;
            border-radius: 10px;
            cursor: pointer;
            margin-top: 20px;
            font-weight: bold;
        }
        .hidden { display: none; }
        .warning { color: #ff0; }
    </style>
</head>
<body>
    <h1>Test d'Acuité Visuelle Flashé</h1>
    <p>Identifiez les lettres qui apparaissent brièvement (60 ms)</p>

    <div id="videoContainer">
        <video id="video" playsinline autoplay muted></video>
        <div id="letterDisplay"></div>
    </div>

    <div id="prompt">Cliquez sur "Démarrer le test" pour commencer</div>

    <div id="validationButtons" class="hidden">
        <button class="letterButton" data-letter="A">A</button>
        <button class="letterButton" data-letter="C">C</button>
        <button class="letterButton" data-letter="D">D</button>
        <button class="letterButton" data-letter="F">F</button>
        <button class="letterButton" data-letter="H">H</button>
        <button class="letterButton" data-letter="L">L</button>
        <button class="letterButton" data-letter="N">N</button>
        <button class="letterButton" data-letter="O">O</button>
        <button class="letterButton" data-letter="P">P</button>
        <button class="letterButton" data-letter="T">T</button>
        <button class="letterButton" data-letter="U">U</button>
        <button class="letterButton" data-letter="V">V</button>
        <button class="letterButton" data-letter="Z">Z</button>
    </div>

    <div id="stats" class="hidden">
        <strong>Score : </strong><span id="score">0/0 (0%)</span>
    </div>

    <button id="startButton">DÉMARRER LE TEST</button>

    <script>
        // --- CONFIGURATION ---
        const letters = ["A", "C", "D", "F", "H", "L", "N", "O", "P", "T", "U", "V", "Z"];
        let testRunning = false;
        let correctAnswers = 0;
        let totalQuestions = 0;

        // --- ÉLÉMENTS DOM ---
        const letterDisplay = document.getElementById('letterDisplay');
        const prompt = document.getElementById('prompt');
        const stats = document.getElementById('stats');
        const startButton = document.getElementById('startButton');
        const video = document.getElementById('video');
        const validationButtons = document.getElementById('validationButtons');
        const scoreDisplay = document.getElementById('score');

        // --- INITIALISATION ---
        startButton.addEventListener('click', startTest);
        validationButtons.querySelectorAll('.letterButton').forEach(button => {
            button.addEventListener('click', () => handleAnswer(button.dataset.letter));
        });

        // --- DÉMARRER LE TEST ---
        async function startTest() {
            try {
                console.log("Démarrage de la caméra...");
                const stream = await navigator.mediaDevices.getUserMedia({
                    video: { facingMode: 'user', width: 320, height: 240 }
                });
                video.srcObject = stream;
                video.play();

                startButton.classList.add('hidden');
                validationButtons.classList.remove('hidden');
                stats.classList.remove('hidden');
                prompt.textContent = "Regardez l'écran...";
                testRunning = true;

                console.log("Test démarré. Lancement de la boucle de flash...");
                startLetterFlashLoop();

            } catch (err) {
                prompt.innerHTML = `<span class="warning">Erreur caméra : ${err.message}</span>`;
                console.error("Erreur caméra:", err);
            }
        }

        // --- BOUCLE PRINCIPALE DE FLASH ---
        function startLetterFlashLoop() {
            if (!testRunning) return;

            console.log("Nouveau cycle de flash...");

            // Choisir une lettre aléatoire
            const randomLetter = letters[Math.floor(Math.random() * letters.length)];
            console.log("Lettre flashée:", randomLetter);

            // Afficher la lettre pendant 60 ms
            letterDisplay.innerText = randomLetter;
            letterDisplay.style.opacity = '1';

            // Masquer après 60 ms
            setTimeout(() => {
                letterDisplay.style.opacity = '0';
                console.log("Lettre masquée");
            }, 60);

            // Relancer après 1.5 secondes
            setTimeout(startLetterFlashLoop, 1500);
        }

        // --- GESTION DES RÉPONSES ---
        function handleAnswer(selectedLetter) {
            if (!testRunning) return;

            totalQuestions++;
            const buttons = validationButtons.querySelectorAll('.letterButton');

            if (selectedLetter === letterDisplay.innerText) {
                correctAnswers++;
                prompt.innerHTML = `<span style="color: #0f0; font-size: 24px;">✅ Correct !</span>`;
            } else {
                prompt.innerHTML = `<span style="color: #f55; font-size: 24px;">❌ Faux ! La lettre était : ${letterDisplay.innerText}</span>`;
            }

            // Mettre à jour les statistiques
            const accuracy = Math.round((correctAnswers / totalQuestions) * 100);
            scoreDisplay.textContent = `${correctAnswers}/${totalQuestions} (${accuracy}%)`;

            // Désactiver les boutons pendant 2 secondes
            buttons.forEach(button => button.disabled = true);
            setTimeout(() => {
                prompt.textContent = "Identifiez la prochaine lettre...";
                buttons.forEach(button => button.disabled = false);
            }, 2000);
        }
    </script>
</body>
</html>
