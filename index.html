<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Test AV - Calibrage d'Acuité</title>
    <style>
        body {
            margin: 0;
            background: #000;
            overflow: hidden;
            font-family: sans-serif;
            color: white;
            touch-action: manipulation;
        }

        #letterDisplay {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 100px;
            font-weight: bold;
            color: white;
            opacity: 0;
            z-index: 999; /* Très haut pour être au-dessus de tout */
            pointer-events: none;
            text-shadow: 0 0 15px rgba(255, 255, 255, 0.7), 0 0 5px black;
            transition: opacity 0.05s linear;
        }

        #calibOverlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.95);
            z-index: 1000; /* Plus haut que la lettre */
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        #calibTitle {
            font-size: 20px;
            margin-bottom: 20px;
            color: #0ff;
        }

        #calibInstructions {
            font-size: 14px;
            margin-bottom: 30px;
            text-align: center;
            max-width: 300px;
        }

        #calibControls {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
        }

        .calibBtn {
            padding: 12px 24px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
            background: #4ecdc4;
            border: none;
            color: white;
        }

        .calibBtn:hover {
            background: #3db8b8;
        }

        #calibFeedback {
            font-size: 14px;
            margin-top: 20px;
            min-height: 20px;
            color: #ff0;
        }

        #calibResult {
            margin-top: 30px;
            font-size: 16px;
            color: #0ff;
            font-weight: bold;
        }

        #skipCalib {
            position: absolute;
            bottom: 20px;
            right: 20px;
            background: #555 !important;
            padding: 8px 12px;
            font-size: 12px;
        }
    </style>
</head>
<body>

    <!-- Lettre qui s'affiche par-dessus tout -->
    <div id="letterDisplay">A</div>

    <!-- Overlay de calibrage -->
    <div id="calibOverlay">
        <h2 id="calibTitle">Calibrage de l'acuité visuelle</h2>
        <p id="calibInstructions">
            Une lettre va s'afficher brièvement.<br>
            Cliquez sur "VU" si vous l'avez vue, "PAS VU" sinon.
        </p>

        <div id="calibControls">
            <button class="calibBtn" onclick="calibResponse(true)">VU</button>
            <button class="calibBtn" onclick="calibResponse(false)">PAS VU</button>
        </div>

        <div id="calibFeedback"></div>
        <div id="calibResult"></div>

        <button onclick="skipCalibration()" class="calibBtn" id="skipCalib">Passer</button>
    </div>

    <script>
        // =============================================
        // VARIABLES
        // =============================================
        let minSize = 20;
        let maxSize = 300;
        let currentSize = 150;
        let letters = "C D F H L N O P T U V Z".split(" ");
        let currentLetterIndex = 0;
        let acuityCalibrated = null;
        let isCalibrating = false;

        // =============================================
        // FONCTIONS DE CALIBRAGE
        // =============================================
        function startCalibration() {
            document.getElementById('calibOverlay').style.display = 'flex';
            document.getElementById('letterDisplay').style.opacity = '0';
            isCalibrating = true;

            minSize = 20;
            maxSize = 300;
            currentSize = 150;
            document.getElementById('calibFeedback').textContent = '';
            document.getElementById('calibResult').textContent = '';

            showNextLetter();
        }

        function showNextLetter() {
            if (!isCalibrating) return;

            currentLetterIndex = Math.floor(Math.random() * letters.length);
            document.getElementById('letterDisplay').textContent = letters[currentLetterIndex];
            document.getElementById('letterDisplay').style.fontSize = currentSize + 'px';
            document.getElementById('letterDisplay').style.opacity = '1';

            // Masquer après 60ms
            setTimeout(() => {
                document.getElementById('letterDisplay').style.opacity = '0';
            }, 60);
        }

        function calibResponse(seen) {
            if (!isCalibrating) return;

            // Logique de recherche binaire
            if (seen) {
                minSize = currentSize;
                document.getElementById('calibFeedback').textContent = `Visible à ${currentSize}px`;
            } else {
                maxSize = currentSize;
                document.getElementById('calibFeedback').textContent = `Pas visible à ${currentSize}px`;
            }

            // Calculer la nouvelle taille
            const oldSize = currentSize;
            currentSize = Math.round((minSize + maxSize) / 2);

            // Vérifier la convergence
            if (maxSize - minSize <= 2) {
                acuityCalibrated = calculateAcuity(oldSize);
                document.getElementById('calibResult').textContent = `Acuité calibrée: ${acuityCalibrated.toFixed(2)}`;
                document.getElementById('calibFeedback').textContent = 'Test terminé !';

                // Désactiver les boutons
                document.querySelectorAll('.calibBtn').forEach(btn => btn.disabled = true);

                // Fermer après 2 secondes
                setTimeout(() => {
                    document.getElementById('calibOverlay').style.display = 'none';
                    startMainApp();
                }, 2000);
                return;
            }

            // Afficher la prochaine lettre
            showNextLetter();
        }

        function calculateAcuity(sizePx) {
            // Taille de référence: 1.5mm à 40cm avec acuity=1.0
            const heightCm = (sizePx / 300) * 2.54; // 300 DPI
            const desiredSizeCm = 0.15; // 1.5mm
            return desiredSizeCm / heightCm;
        }

        function skipCalibration() {
            acuityCalibrated = 1.0;
            document.getElementById('calibOverlay').style.display = 'none';
            startMainApp();
        }

        // =============================================
        // DÉMARRAGE
        // =============================================
        function startMainApp() {
            alert("Application principale démarrée avec acuité calibrée: " + acuityCalibrated.toFixed(2));
            // Ici vous intégreriez votre code principal avec tracking, etc.
        }

        // Démarrer le calibrage au chargement
        window.addEventListener('load', () => {
            setTimeout(startCalibration, 1000);
        });
    </script>
</body>
</html>
