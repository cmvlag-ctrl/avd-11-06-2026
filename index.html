<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Test AV - Détection Avancée</title>
    <style>
        body {
            margin: 0;
            background: #000;
            overflow: hidden;
            font-family: sans-serif;
            color: white;
        }
        video {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 0.2;
            z-index: 1;
            transform: scaleX(-1);
        }

        /* Overlay de démarrage */
        #startOverlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            z-index: 10;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 20px;
        }

        #startTitle {
            font-size: 2em;
            color: #0f0;
        }

        .startButton {
            padding: 15px 30px;
            background: #333;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1.2em;
            cursor: pointer;
            transition: background 0.3s;
        }

        .startButton:hover {
            background: #555;
        }

        /* Jauge de vitesse */
        #speedGaugeContainer {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            width: 80%;
            max-width: 500px;
            display: none;
        }
        .speed-gauge {
            height: 6px;
            background: #333;
            margin-top: 5px;
            border-radius: 3px;
            overflow: hidden;
        }
        .speed-bar {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #0f0, #ff0, #f00);
            transition: width 0.1s;
        }

        /* Test d'acuité */
        #acuityOverlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.9);
            z-index: 20;
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 20px;
        }

        #acuityLetter {
            font-size: 200px;
            font-weight: bold;
            color: white;
            opacity: 0;
            transition: opacity 0.5s;
            text-shadow: 0 0 10px black;
        }

        #acuityFeedback {
            font-size: 1.5em;
            color: #0f0;
        }

        #acuityScore {
            font-size: 2em;
            color: #ff0;
            font-weight: bold;
        }

        #acuityDistance {
            font-size: 1.2em;
            color: #aaa;
        }

        #acuityInstructions {
            font-size: 1.2em;
            max-width: 80%;
            text-align: center;
        }
    </style>
</head>
<body>
    <video id="video" autoplay></video>

    <!-- Overlay de démarrage -->
    <div id="startOverlay">
        <h1 id="startTitle">Test AV - Détection Avancée</h1>
        <button id="startDynamicBtn" class="startButton">DÉMARRER (Mode Dynamique)</button>
        <button id="startAcuityBtn" class="startButton">👁️ Tester mon acuité visuelle</button>
    </div>

    <!-- Overlay du test d'acuité -->
    <div id="acuityOverlay">
        <div id="acuityInstructions">
            Regardez attentivement l'écran.<br>
            Une lettre apparaîtra brièvement.<br>
            Dites-moi quelle lettre vous avez vue.
        </div>
        <div id="acuityLetter"></div>
        <div id="acuityFeedback"></div>
        <div id="acuityDistance">Distance: Calcul en cours...</div>
        <div id="acuityScore"></div>
    </div>

    <!-- Jauge de vitesse (visible uniquement en mode dynamique) -->
    <div id="speedGaugeContainer">
        <div style="text-align: center; margin-bottom: 5px;">Vitesse détectée</div>
        <div class="speed-gauge">
            <div class="speed-bar" id="speedBar"></div>
        </div>
        <div style="text-align: center; margin-top: 5px;" id="speedValue">0 km/h</div>
    </div>

    <script>
        // =============================================
        // VARIABLES GLOBALES
        // =============================================

        // Éléments DOM
        const video = document.getElementById('video');
        const startOverlay = document.getElementById('startOverlay');
        const acuityOverlay = document.getElementById('acuityOverlay');
        const startDynamicBtn = document.getElementById('startDynamicBtn');
        const startAcuityBtn = document.getElementById('startAcuityBtn');
        const speedBar = document.getElementById('speedBar');
        const speedValue = document.getElementById('speedValue');
        const speedGaugeContainer = document.getElementById('speedGaugeContainer');
        const acuityLetter = document.getElementById('acuityLetter');
        const acuityFeedback = document.getElementById('acuityFeedback');
        const acuityDistance = document.getElementById('acuityDistance');
        const acuityScore = document.getElementById('acuityScore');

        // Variables pour le mode dynamique
        let currentSpeed = 0;
        let minSpeedTrigger = 5;
        let cooldownDuration = 1000;
        let lastFlashTime = 0;
        let state = 'IDLE';
        let now = 0;
        let dynamicLoopActive = false;

        // Variables pour le test d'acuité
        let acuityTestActive = false;
        let currentTestIndex = 0;
        let totalTests = 10;
        let testSequence = [];
        let currentAcuityTestLetter = '';
        let letterFlashTimeout;
        let distance = 60; // Distance par défaut en cm
        let acuity = 1.0; // Acuité par défaut
        let screenDPI = 96;

        // =============================================
        // INITIALISATION
        // =============================================

        // Lancer la caméra
        navigator.mediaDevices.getUserMedia({ video: true })
            .then(stream => {
                video.srcObject = stream;
            })
            .catch(err => {
                console.error("Erreur accès caméra:", err);
            });

        // =============================================
        // PARTIE DYNAMIQUE (inchangée et fonctionnelle)
        // =============================================

        function calculateSize(distCm, acuityDecimal) {
            let heightCm = (distCm * 0.0145) / acuityDecimal;
            let heightPx = (heightCm / 2.54) * screenDPI;
            return Math.max(20, Math.round(heightPx));
        }

        function dynamicLoop() {
            if (!dynamicLoopActive) return;

            now = Date.now();

            // Logique de détection de vitesse (simulée pour l'exemple)
            currentSpeed = Math.random() * 50 + 10;

            // Mettre à jour la jauge
            let speedPercentage = Math.min(100, currentSpeed / 50 * 100);
            speedBar.style.width = speedPercentage + '%';
            speedValue.textContent = Math.round(currentSpeed) + ' km/h';

            // Logique de flash
            if (state === 'IDLE') {
                if (currentSpeed > minSpeedTrigger && (now - lastFlashTime > cooldownDuration)) {
                    state = 'FLASH';
                    lastFlashTime = now;

                    // Flash visuel
                    document.body.style.backgroundColor = '#f00';
                    setTimeout(() => {
                        document.body.style.backgroundColor = '#000';
                        state = 'IDLE';
                    }, 200);
                }
            }

            requestAnimationFrame(dynamicLoop);
        }

        // =============================================
        // PARTIE TEST D'ACUITÉ (60ms d'apparition)
        // =============================================

        function initAcuityTest() {
            const letters = 'ABCDEFGHJKLMNPRSTUVWXYZ';
            testSequence = [];
            for (let i = 0; i < totalTests; i++) {
                testSequence.push(letters[Math.floor(Math.random() * letters.length)]);
            }
        }

        function showNextAcuityLetter() {
            if (!acuityTestActive) return;

            if (currentTestIndex >= totalTests) {
                endAcuityTest();
                return;
            }

            currentAcuityTestLetter = testSequence[currentTestIndex];
            const letterSizePx = calculateSize(distance, acuity);

            acuityLetter.innerText = currentAcuityTestLetter;
            acuityLetter.style.fontSize = letterSizePx + 'px';
            acuityLetter.style.opacity = '1';

            // Temps d'apparition réduit à 60ms
            letterFlashTimeout = setTimeout(() => {
                acuityLetter.style.opacity = '0';

                setTimeout(() => {
                    askForAcuityAnswer();
                }, 1000);
            }, 60); // ← 60ms
        }

        function askForAcuityAnswer() {
            const userAnswer = prompt("Quelle lettre avez-vous vue ? (Majuscule)");
            checkAcuityAnswer(userAnswer);
        }

        function checkAcuityAnswer(userAnswer) {
            if (userAnswer === currentAcuityTestLetter) {
                acuityFeedback.textContent = "✅ Correct !";
                acuityFeedback.style.color = "#0f0";
            } else {
                acuityFeedback.textContent = `❌ Faux ! La lettre était ${currentAcuityTestLetter}`;
                acuityFeedback.style.color = "#f55";
            }

            currentTestIndex++;
            setTimeout(showNextAcuityLetter, 1500);
        }

        function endAcuityTest() {
            acuityTestActive = false;
            acuityOverlay.style.display = 'none';
            acuityFeedback.textContent = '';
            acuityScore.textContent = `Votre acuité visuelle: ${Math.round((currentTestIndex / totalTests) * 10)}/10`;
            acuityScore.style.color = "#ff0";

            setTimeout(() => {
                acuityScore.textContent = '';
                startOverlay.style.display = 'flex';
            }, 3000);
        }

        function startAcuityTest() {
            startOverlay.style.display = 'none';
            acuityOverlay.style.display = 'flex';
            acuityTestActive = true;
            currentTestIndex = 0;
            acuityFeedback.textContent = 'Prêt ?';
            acuityFeedback.style.color = "#0f0";
            initAcuityTest();
            showNextAcuityLetter();
        }

        // =============================================
        // GESTION DES BOUTONS
        // =============================================

        startDynamicBtn.addEventListener('click', () => {
            startOverlay.style.display = 'none';
            speedGaugeContainer.style.display = 'block';
            dynamicLoopActive = true;
            dynamicLoop();
        });

        startAcuityBtn.addEventListener('click', startAcuityTest);

        // Simulation de la distance pour le test d'acuité
        setInterval(() => {
            distance = 50 + Math.random() * 30;
            acuityDistance.textContent = `Distance: ${Math.round(distance)} cm`;
        }, 3000);
    </script>
</body>
</html>
