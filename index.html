<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test d'Acuité Flashée - Version Adaptative</title>
    <script src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js"></script>
    <style>
        body {
            margin: 0;
            background: #000;
            font-family: Arial, sans-serif;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            text-align: center;
        }
        #testContainer {
            width: 100%;
            max-width: 1000px;
            padding: 20px;
        }
        #videoContainer {
            position: relative;
            margin-bottom: 20px;
            border: 2px solid #4ecdc4;
            border-radius: 10px;
            overflow: hidden;
            width: 100%;
            max-width: 600px;
            aspect-ratio: 4/3;
        }
        #video {
            width: 100%;
            transform: scaleX(-1); /* Miroir */
        }
        #letterDisplay {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: white;
            text-shadow: 0 0 30px #fff;
            opacity: 0;
            transition: opacity 0.1s linear;
            pointer-events: none;
            font-weight: bold;
            text-align: center;
            z-index: 10;
        }
        #prompt {
            font-size: 24px;
            margin: 20px 0;
            min-height: 60px;
        }
        #validationButtons {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 10px;
            margin: 20px 0;
        }
        .letterButton {
            background: #4ecdc4;
            border: none;
            padding: 15px 20px;
            font-size: 24px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            min-width: 60px;
        }
        .letterButton:hover {
            background: #45b7b8;
        }
        #results {
            margin-top: 20px;
            font-size: 20px;
            min-height: 100px;
        }
        #startButton {
            background: #4CAF50;
            border: none;
            padding: 15px 30px;
            font-size: 20px;
            border-radius: 8px;
            cursor: pointer;
            margin-bottom: 20px;
        }
        #distanceInfo {
            font-size: 16px;
            margin: 10px 0;
            color: #ccc;
        }
        #sizeInfo {
            font-size: 18px;
            margin: 10px 0;
            color: #ffeb3b;
        }
        #errorsInfo {
            font-size: 18px;
            margin: 10px 0;
            color: #f44336;
        }
    </style>
</head>
<body>
    <div id="testContainer">
        <h1>Test d'Acuité Visuelle Flashée - Version Adaptative</h1>
        <p>Placez votre visage à une distance confortable de la caméra (environ 50 cm).</p>

        <button id="startButton">DÉMARRER LE TEST</button>

        <div id="distanceInfo">Distance estimée : -- cm</div>
        <div id="sizeInfo">Taille actuelle : -- px</div>
        <div id="errorsInfo">Erreurs consécutives : 0</div>

        <div id="videoContainer">
            <video id="video" autoplay muted></video>
            <div id="letterDisplay"></div>
        </div>

        <div id="prompt">Préparez-vous...</div>

        <div id="validationButtons" style="display: none;">
            <!-- Boutons générés dynamiquement -->
        </div>

        <div id="results"></div>
    </div>

    <script>
        // Configuration
        const FLASH_DURATION = 60; // ms
        const MIN_FONT_SIZE = 20; // Taille minimale des lettres (px)
        const MAX_FONT_SIZE = 400; // Taille maximale des lettres (px)
        const SIZE_ADJUSTMENT = 0.9; // Réduction de taille après bonne réponse (90% de la taille actuelle)
        const SIZE_INCREASE = 1.1; // Augmentation de taille après mauvaise réponse (110% de la taille actuelle)
        const FACE_REAL_WIDTH = 15; // Largeur réelle moyenne d'un visage (cm)
        const EYE_DISTANCE = 6.5; // Distance moyenne entre les yeux (cm)

        // Variables globales
        let video;
        let letterDisplay;
        let validationButtons;
        let prompt;
        let distanceInfo;
        let sizeInfo;
        let errorsInfo;
        let resultsDiv;
        let startButton;
        let currentFontSize = 150; // Taille de départ (px)
        let errorsInRow = 0;
        let currentLetter = '';
        let isTestRunning = false;
        let faceDetector;
        let distance = 50; // Distance estimée par défaut (cm)

        // Lettres disponibles
        const letters = ['A', 'B', 'C', 'D', 'E', 'F', 'H', 'K', 'L', 'M', 'N', 'O', 'P', 'R', 'S', 'T', 'U', 'V', 'X', 'Z'];

        // Initialisation
        document.addEventListener('DOMContentLoaded', async () => {
            video = document.getElementById('video');
            letterDisplay = document.getElementById('letterDisplay');
            validationButtons = document.getElementById('validationButtons');
            prompt = document.getElementById('prompt');
            distanceInfo = document.getElementById('distanceInfo');
            sizeInfo = document.getElementById('sizeInfo');
            errorsInfo = document.getElementById('errorsInfo');
            resultsDiv = document.getElementById('results');
            startButton = document.getElementById('startButton');

            // Charger les modèles de détection de visage
            await loadFaceModels();

            // Configurer le bouton de démarrage
            startButton.addEventListener('click', startTest);

            // Initialiser les boutons de validation
            setupValidationButtons();
        });

        // Charger les modèles de face-api.js
        async function loadFaceModels() {
            await faceapi.nets.tinyFaceDetector.loadFromUri('https://justadudewhohacks.github.io/face-api.js/models');
            await faceapi.nets.faceLandmark68Net.loadFromUri('https://justadudewhohacks.github.io/face-api.js/models');
            console.log("Modèles de détection de visage chargés");
        }

        // Démarrer le test
        async function startTest() {
            startButton.disabled = true;
            prompt.textContent = "Calibration de la distance...";

            // Réinitialiser les variables
            currentFontSize = 150;
            errorsInRow = 0;
            resultsDiv.innerHTML = '';

            // Mettre à jour l'affichage
            updateInfoDisplays();

            // Démarrer la caméra
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: true });
                video.srcObject = stream;

                // Attendre que la caméra soit prête
                await new Promise(resolve => video.onloadedmetadata = resolve);

                // Démarrer la calibration de distance
                startDistanceCalibration();

                // Après 3 secondes, lancer le test
                setTimeout(() => {
                    isTestRunning = true;
                    prompt.textContent = "Test en cours...";
                    showNextLetter();
                }, 3000);

            } catch (err) {
                console.error("Erreur accès caméra:", err);
                prompt.textContent = "Erreur: Accès caméra refusé";
                startButton.disabled = false;
            }
        }

        // Démarrer la calibration de distance
        function startDistanceCalibration() {
            // Mettre à jour la distance toutes les 500ms
            const interval = setInterval(async () => {
                const detection = await detectFace();
                if (detection) {
                    distance = calculateDistance(detection);
                    distanceInfo.textContent = `Distance estimée : ${Math.round(distance)} cm`;

                    // Adapter la taille des lettres en fonction de la distance
                    currentFontSize = calculateOptimalFontSize(distance);
                    updateInfoDisplays();
                }
            }, 500);

            // Arrêter la calibration après 10 secondes
            setTimeout(() => {
                clearInterval(interval);
                if (isTestRunning) {
                    prompt.textContent = "Test démarré!";
                }
            }, 10000);
        }

        // Détecter le visage
        async function detectFace() {
            if (!video.videoWidth) return null;

            const detections = await faceapi.detectAllFaces(video, new faceapi.TinyFaceDetectorOptions())
                .withFaceLandmarks();

            return detections[0] || null;
        }

        // Calculer la distance caméra/visage
        function calculateDistance(detection) {
            // Utiliser la distance entre les yeux
            const landmarks = detection.landmarks;
            const leftEye = landmarks.getLeftEye();
            const rightEye = landmarks.getRightEye();

            // Calculer la distance en pixels entre les yeux
            const eyeDistancePixels = Math.sqrt(
                Math.pow(rightEye[0].x - leftEye[0].x, 2) +
                Math.pow(rightEye[0].y - leftEye[0].y, 2)
            );

            // Estimer la distance en cm
            const estimatedDistance = (EYE_DISTANCE * video.videoWidth) / (eyeDistancePixels * video.offsetWidth);

            return Math.max(20, Math.min(100, estimatedDistance)); // Limiter entre 20 et 100 cm
        }

        // Calculer la taille optimale des lettres en fonction de la distance
        function calculateOptimalFontSize(distanceCm) {
            // Formule : taille_px = (distance_cm * facteur) / acuité
            // Le facteur 0.0145 correspond à l'angle visuel minimal pour 20/20 vision
            const heightCm = (distanceCm * 0.0145) / 1.0; // Acuité cible 1.0 (20/20)
            const heightPx = (heightCm / 2.54) * 96; // 96 DPI (résolution standard)
            return Math.min(MAX_FONT_SIZE, Math.max(MIN_FONT_SIZE, Math.round(heightPx)));
        }

        // Mettre à jour les affichages d'information
        function updateInfoDisplays() {
            sizeInfo.textContent = `Taille actuelle : ${currentFontSize} px`;
            errorsInfo.textContent = `Erreurs consécutives : ${errorsInRow}`;
        }

        // Afficher la prochaine lettre
        function showNextLetter() {
            if (!isTestRunning) return;

            // Générer une lettre aléatoire
            currentLetter = letters[Math.floor(Math.random() * letters.length)];
            letterDisplay.textContent = currentLetter;
            letterDisplay.style.opacity = '1';
            letterDisplay.style.fontSize = `${currentFontSize}px`;

            // Masquer après 60ms
            setTimeout(() => {
                letterDisplay.style.opacity = '0';

                // Afficher les boutons de validation après le flash
                setTimeout(() => {
                    validationButtons.style.display = 'flex';
                    prompt.textContent = "Quelle lettre avez-vous vue ?";
                }, 10); // Petit délai pour éviter les clics accidentels
            }, FLASH_DURATION);
        }

        // Configurer les boutons de validation
        function setupValidationButtons() {
            validationButtons.innerHTML = '';
            letters.forEach(letter => {
                const button = document.createElement('button');
                button.className = 'letterButton';
                button.textContent = letter;
                button.addEventListener('click', () => validateAnswer(letter));
                validationButtons.appendChild(button);
            });
        }

        // Valider la réponse
        function validateAnswer(selectedLetter) {
            validationButtons.style.display = 'none';

            if (selectedLetter === currentLetter) {
                // Bonne réponse
                letterDisplay.style.color = '#4CAF50';
                letterDisplay.textContent = '✓';
                errorsInRow = 0;

                // Réduire la taille pour la prochaine lettre
                currentFontSize = Math.max(MIN_FONT_SIZE, Math.round(currentFontSize * SIZE_ADJUSTMENT));
                console.log(`Bonne réponse! Taille réduite à ${currentFontSize}px`);
            } else {
                // Mauvaise réponse
                letterDisplay.style.color = '#F44336';
                letterDisplay.textContent = '✗';
                errorsInRow++;

                // Si 3 erreurs consécutives, arrêter le test
                if (errorsInRow >= 3) {
                    endTest();
                    return;
                }

                // Augmenter la taille pour la prochaine lettre
                currentFontSize = Math.min(MAX_FONT_SIZE, Math.round(currentFontSize * SIZE_INCREASE));
                console.log(`Mauvaise réponse! Taille augmentée à ${currentFontSize}px`);
            }

            // Mettre à jour les affichages
            updateInfoDisplays();

            // Attendre 1 seconde avant la prochaine lettre
            setTimeout(() => {
                showNextLetter();
            }, 1000);
        }

        // Arrêter le test
        function endTest() {
            isTestRunning = false;
            prompt.textContent = "TEST TERMINÉ";

            // Arrêter la caméra
            if (video.srcObject) {
                video.srcObject.getTracks().forEach(track => track.stop());
            }

            // Afficher les résultats
            const acuityScore = calculateAcuityScore();
            resultsDiv.innerHTML = `
                <h2>Résultats</h2>
                <p>Distance utilisée : ${Math.round(distance)} cm</p>
                <p>Taille minimale atteinte : ${currentFontSize} px</p>
                <p>Acuité visuelle estimée : ${acuityScore.toFixed(1)}/1.0</p>
                <p>Erreurs consécutives : ${errorsInRow}</p>
            `;

            // Évaluation de l'acuité
            let evaluation = '';
            if (acuityScore >= 0.8) evaluation = "Excellente";
            else if (acuityScore >= 0.6) evaluation = "Bonne";
            else if (acuityScore >= 0.4) evaluation = "Moyenne";
            else evaluation = "Faible";

            resultsDiv.innerHTML += `<p>Évaluation : ${evaluation}</p>`;

            // Réactiver le bouton de démarrage
            startButton.disabled = false;
        }

        // Calculer le score d'acuité
        function calculateAcuityScore() {
            // Plus la taille minimale est petite, meilleure est l'acuité
            // On normalise par rapport à la taille maximale
            return Math.min(1.0, MAX_FONT_SIZE / currentFontSize);
        }
    </script>
</body>
</html>
