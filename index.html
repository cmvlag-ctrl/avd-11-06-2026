<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AVD - Diagnostic & Training</title>
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: sans-serif; color: white; touch-action: none; }
        
        /* Vidéo en arrière plan */
        #video {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            object-fit: cover; opacity: 0.4; z-index: 1; transform: scaleX(-1);
        }

        /* Canvas pour dessiner le diagnostic (carré rouge) */
        #debugCanvas {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 2; transform: scaleX(-1); pointer-events: none;
        }

        /* La lettre */
        #letterDisplay {
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            font-family: 'Arial', sans-serif; font-weight: bold; color: white;
            opacity: 0; z-index: 10; pointer-events: none;
            text-shadow: 0 0 20px rgba(0,0,0,0.8);
        }

        /* Interface Utilisateur */
        #ui {
            position: absolute; top: 10px; left: 10px; z-index: 20;
            background: rgba(0,0,0,0.85); padding: 15px; border-radius: 8px;
            width: 300px; border: 1px solid #333;
        }

        .btn {
            width: 100%; padding: 12px; margin-top: 8px; border: none; border-radius: 4px;
            font-weight: bold; cursor: pointer; font-size: 14px;
        }
        .btn-primary { background: #0984e3; color: white; }
        .btn-success { background: #00b894; color: white; }
        .btn-warn { background: #e17055; color: white; }
        
        .info-row { display: flex; justify-content: space-between; font-size: 13px; margin: 4px 0; font-family: monospace; }
        .label { color: #aaa; }
        .val { color: #fff; font-weight: bold; }

        #overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; z-index: 50; display: flex; flex-direction: column;
            align-items: center; justify-content: center;
        }
    </style>
</head>
<body>

    <div id="overlay">
        <h2>Test Diagnostic</h2>
        <p style="color:#888; text-align:center; padding:0 20px;">
            Autorisez la caméra.<br>Un cadre rouge doit suivre votre visage.
        </p>
        <button class="btn btn-primary" style="width:200px;" onclick="startSystem()">DÉMARRER</button>
    </div>

    <video id="video" playsinline autoplay muted></video>
    <canvas id="debugCanvas"></canvas>
    <div id="letterDisplay">E</div>

    <div id="ui" style="display:none;">
        <div class="info-row"><span class="label">État:</span> <span class="val" id="statusText" style="color:#fdcb6e">INIT...</span></div>
        <div class="info-row"><span class="label">Vitesse:</span> <span class="val" id="valSpeed">0</span> <span style="font-size:10px; color:#555">px/s</span></div>
        
        <!-- Jauge visuelle -->
        <div style="height:6px; background:#333; margin: 8px 0; border-radius:3px;">
            <div id="speedBar" style="height:100%; width:0%; background:red; transition: width 0.1s;"></div>
        </div>

        <div class="info-row"><span class="label">Seuil déclenchement:</span> <span class="val">150</span></div>

        <hr style="border-color:#333; opacity:0.5;">

        <!-- Contrôle Acuité -->
        <div class="info-row"><span class="label">Niveau (Dixième):</span> <span class="val" id="valAcuity">1.0</span></div>
        <input type="range" id="acuitySlider" min="0.1" max="2.0" step="0.1" value="1.0" oninput="updateAcuity(this.value)" style="width:100%">

        <button class="btn btn-warn" onclick="toggleTestMode()">MODE TEST (Statique)</button>
        <button class="btn btn-success" id="btnTrain" onclick="toggleTrainMode()">MODE TRAINING (Dynamique)</button>
    </div>

    <!-- Librairies TFJS -->
