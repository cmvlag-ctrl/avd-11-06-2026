<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Test AV - Détection Avancée</title>
    <style>
        body {
            margin: 0;
            background: #000;
            overflow: hidden;
            font-family: sans-serif;
            color: white;
            touch-action: manipulation;
        }

        video {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 0.2;
            z-index: 1;
            transform: scaleX(-1);
        }

        #letterDisplay {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 100px;
            font-weight: bold;
            color: white;
            opacity: 0;
            z-index: 10;
            pointer-events: none;
            text-shadow: 0 0 15px rgba(255, 255, 255, 0.7), 0 0 5px black;
        }

        #ui {
            position: absolute;
            top: 10px;
            left: 10px;
            z-index: 20;
            background: rgba(0,0,0,0.8);
            padding: 15px;
            border-radius: 10px;
            max-width: 320px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }

        .stat {
            font-size: 12px;
            margin: 4px 0;
            color: #0f0;
            font-family: monospace;
        }

        .error {
            color: #f55;
            font-size: 13px;
            margin-top: 10px;
        }

        /* Jauge de vitesse */
        .speed-gauge {
            height: 6px;
            background: #333;
            margin-top: 8px;
            border-radius: 3px;
            overflow: hidden;
        }

        .speed-bar {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #0f0, #ff0, #f00);
            transition: width 0.1s linear;
        }

        button {
            background: #4ecdc4;
            border: none;
            padding: 10px 15px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            width: 100%;
            margin-top: 8px;
            font-size: 14px;
            transition: background 0.2s;
        }

        button:hover {
            background: #3db8b8;
        }

        button.secondary {
            background: #555;
            color: white;
            margin-top: 10px;
        }

        button.secondary:hover {
            background: #444;
        }

        #startOverlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000;
            z-index: 100;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 20px;
        }

        #calibPanel {
            display: none;
            margin-top: 15px;
            padding-top: 15px;
            border-top: 1px solid #444;
            text-align: center;
        }

        .calib-bar-container {
            height: 25px;
            border: 2px dashed #666;
            margin: 12px auto;
            display: flex;
            justify-content: flex-start;
            align-items: center;
            width: 30mm;
            background: rgba(255,255,255,0.05);
            position: relative;
        }

        .calib-bar {
            height: 100%;
            background: #ff4444;
            width: 10mm;
            transform-origin: left center;
            border-radius: 1px;
        }

        .calib-label {
            font-size: 11px;
            margin-bottom: 8px;
            color: #ddd;
            max-width: 280px;
        }

        input[type="range"] {
            width: 100%;
            margin: 8px 0;
        }

        hr {
            border: none;
            border-top: 1px solid #333;
            margin: 10px 0;
        }
    </style>
</head>
<body>

    <div id="startOverlay">
        <h1 style="margin:0 0 10px 0;">Test Acuité (Pro)</h1>
        <p style="margin:0 0 20px 0;">Détection de vitesse optimisée.</p>
        <button onclick="startApp()" id="startBtn">DÉMARRER</button>
        <p id="errorMsg" class="error"></p>
    </div>

    <video id="video" playsinline autoplay muted></video>
    <div id="letterDisplay">A</div>

    <div id="ui" style="display:none;">
        <div class="stat" id="statusInit">Initialisation...</div>
        <div class="stat" id="statusSpeed">Vitesse: 0</div>
        <div class="speed-gauge"><div class="speed-bar" id="speedBar"></div></div>

        <div class="stat" id="statusDist" style="margin-top:8px;">Distance: -- cm</div>
        <div class="stat" id="statusSize">Taille lettre: -- px</div>

        <hr>

        <div style="font-size:11px; margin-bottom:8px;">
            Acuité: <span id="valAcuity">1.0</span>
            <input type="range" id="acuity" min="0.1" max="2.0" step="0.1" value="1.0" oninput="updateParams()" style="width:100%; margin:0;">
        </div>

        <button class="secondary" onclick="toggleCalib()">📏 Calibrer l'écran</button>

        <div id="calibPanel">
            <div class="calib-label">
                Ajustez la barre rouge pour qu'elle mesure exactement <b>1 cm</b> sur votre écran avec une règle.
            </div>
            <div class="calib-bar-container">
                <div class="calib-bar" id="calibBar"></div>
            </div>
            <input type="range" id="calibSlider" min="0.5" max="2.0" step="0.01" value="1.0" oninput="updateCalib()" style="width:100%;">
            <button onclick="saveCalib()" style="background:#28a745; margin-top:10px;">Sauvegarder calibration</button>
            <p id="calibFeedback" style="font-size:11px; margin-top:8px; color:#aaa;"></p>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.11.0"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/blazeface@0.0.7"></script>

    <script>
        // =============================================
        // PARAMÈTRES ET VARIABLES GLOBALES
        // =============================================
        let model = null;
        let video = document.getElementById('video');
        let letterEl = document.getElementById('letterDisplay');
        let ui = document.getElementById('ui');
        let overlay = document.getElementById('startOverlay');
        let startBtn = document.getElementById('startBtn');

        // Paramètres de calibration
        let calibrationFactor = 1.0;
        let screenDPI = 300; // Valeur par défaut

        // Paramètres d'acuité
        let acuity = 1.0;

        // Tracking
        let lastHeadPos = null;
        let lastTime = 0;
        let speed = 0;
        let smoothedSpeed = 0;
        let distance = 50;
        let rawDistance = 50;
        let state = 'IDLE';
        let lastFlashTime = 0;
        const letters = "C D F H L N O P T U V Z".split(" ");

        // =============================================
        // FONCTIONS DE CALIBRATION
        // =============================================
        function toggleCalib() {
            const panel = document.getElementById('calibPanel');
            panel.style.display = panel.style.display === 'none' ? 'block' : 'none';
            updateCalib(); // Met à jour l'affichage de la barre
        }

        function updateCalib() {
            calibrationFactor = parseFloat(document.getElementById('calibSlider').value);
            const calibBar = document.getElementById('calibBar');
            calibBar.style.transform = `scaleX(${calibrationFactor})`;
        }

        function saveCalib() {
            localStorage.setItem('avd_blazeface_calib_v3', calibrationFactor);
            document.getElementById('calibPanel').style.display = 'none';

            // Recalculer screenDPI avec la nouvelle calibration
            const dpr = window.devicePixelRatio || 1;
            let baseDPI = dpr > 2 ? 450 : (dpr > 1 ? 300 : 150);
            screenDPI = baseDPI * calibrationFactor;

            document.getElementById('calibFeedback').innerText = "✓ Calibration sauvegardée !";
            updateStats();

            // Effacer le message après 3 secondes
            setTimeout(() => {
                document.getElementById('calibFeedback').innerText = '';
            }, 3000);
        }

        function loadCalib() {
            const saved = localStorage.getItem('avd_blazeface_calib_v3');
            if (saved) {
                calibrationFactor = parseFloat(saved);
                document.getElementById('calibSlider').value = calibrationFactor;
                updateCalib();

                // Appliquer la calibration au démarrage
                const dpr = window.devicePixelRatio || 1;
                let baseDPI = dpr > 2 ? 450 : (dpr > 1 ? 300 : 150);
                screenDPI = baseDPI * calibrationFactor;
            }
        }

        // =============================================
        // FONCTIONS DE PARAMÈTRES
        // =============================================
        function updateParams() {
            acuity = parseFloat(document.getElementById('acuity').value);
            document.getElementById('valAcuity').innerText = acuity.toFixed(1);
        }

        // =============================================
        // FONCTIONS DE STATISTIQUES
        // =============================================
        function updateStats() {
            document.getElementById('statusSpeed').innerText = `Vitesse: ${Math.round(speed)}`;
            document.getElementById('statusDist').innerText = `Distance: ~${Math.round(distance)} cm`;

            // Taille de la lettre courante
            let currentSize = calculateSize(distance, acuity);
            document.getElementById('statusSize').innerText = `Taille lettre: ${currentSize} px`;

            // Mise à jour de la jauge de vitesse
            let pct = Math.min(100, (speed / 250) * 100);
            const speedBar = document.getElementById('speedBar');
            speedBar.style.width = `${pct}%`;

            if(speed > 150) {
                speedBar.style.background = '#f00';
            } else {
                speedBar.style.background = 'linear-gradient(90deg, #0f0, #ff0, #f00)';
            }
        }

        // =============================================
        // CALCUL DE LA TAILLE DES LETTRES
        // =============================================
        function calculateSize(distCm, acuityDecimal) {
            // Taille angulaire standard pour un test d'acuité (0.0145 radians ≈ 5 minutes d'arc)
            let heightCm = (distCm * 0.0145) / acuityDecimal;
            // Conversion en pixels avec le DPI calibré
            let heightPx = (heightCm / 2.54) * screenDPI;
            return Math.max(20, Math.round(heightPx));
        }

        // =============================================
        // MACHINE D'ÉTAT
        // =============================================
        function handleState(currentSpeed, now) {
            const minSpeedTrigger = 150;
            const flashDuration = 60;
            const cooldownDuration = 1000;

            if (state === 'IDLE') {
                if (currentSpeed > minSpeedTrigger && (now - lastFlashTime > cooldownDuration)) {
                    state = 'FLASH';
                    lastFlashTime = now;

                    const randomLetter = letters[Math.floor(Math.random() * letters.length)];
                    letterEl.innerText = randomLetter;
                    letterEl.style.fontSize = calculateSize(distance, acuity) + 'px';
                    letterEl.style.opacity = '1';

                    setTimeout(() => {
                        letterEl.style.opacity = '0';
                        state = 'IDLE';
                    }, flashDuration);
                }
            }
        }

        // =============================================
        // BOUCLE PRINCIPALE
        // =============================================
        async function loop() {
            if (!model) return;

            try {
                const predictions = await model.estimateFaces(video, false);

                if (predictions.length > 0) {
                    const face = predictions[0];
                    const nose = face.landmarks[2];
                    const leftEye = face.landmarks[0];
                    const rightEye = face.landmarks[1];

                    // Calcul de la distance inter-oculaire
                    const distInterYeuxPx = Math.sqrt(
                        Math.pow(rightEye[0] - leftEye[0], 2) +
                        Math.pow(rightEye[1] - leftEye[1], 2)
                    );

                    const K_FACTOR = 2800;
                    if (distInterYeuxPx > 5) {
                        let calculatedDist = K_FACTOR / distInterYeuxPx;
                        rawDistance = calculatedDist;
                        distance = (distance * 0.9) + (rawDistance * 0.1);
                        distance = Math.max(30, Math.min(120, distance));
                    }

                    // Calcul de la vitesse
                    const now = performance.now();
                    if (lastHeadPos) {
                        const dt = (now - lastTime);
                        if (dt > 16) {
                            const dx = nose[0] - lastHeadPos.x;
                            const dy = nose[1] - lastHeadPos.y;
                            const distPx = Math.sqrt(dx*dx + dy*dy);
                            let rawSpeed = distPx / dt;
                            smoothedSpeed = (smoothedSpeed * 0.7) + (rawSpeed * 0.3);
                            speed = smoothedSpeed * 1000;
                        }
                    }
                    lastHeadPos = { x: nose[0], y: nose[1] };
                    lastTime = now;

                    handleState(speed, now);
                    updateStats();

                } else {
                    // Décélération si pas de visage détecté
                    smoothedSpeed = smoothedSpeed * 0.9;
                    speed = smoothedSpeed * 1000;
                    updateStats();
                }
            } catch (error) {
                console.error("Erreur dans la boucle principale:", error);
            }

            requestAnimationFrame(loop);
        }

        // =============================================
        // DÉMARRAGE DE L'APPLICATION
        // =============================================
        async function startApp() {
            startBtn.disabled = true;
            startBtn.textContent = "Chargement...";

            try {
                loadCalib(); // Charge la calibration sauvegardée

                const stream = await navigator.mediaDevices.getUserMedia({
                    video: {
                        facingMode: 'user',
                        width: { ideal: 640 },
                        height: { ideal: 480 }
                    }
                });

                video.srcObject = stream;
                video.onloadedmetadata = async () => {
                    overlay.style.display = 'none';
                    ui.style.display = 'block';
                    document.getElementById('statusInit').innerText = "Chargement IA...";

                    try {
                        model = await blazeface.load();
                        document.getElementById('statusInit').innerText = "Prêt !";

                        // Initialisation des paramètres
                        updateParams();

                        // Démarrage de la boucle principale
                        loop();
                    } catch (aiError) {
                        document.getElementById('statusInit').innerText = "Erreur IA: " + aiError.message;
                        console.error("Erreur IA:", aiError);
                    }
                };
            } catch (err) {
                document.getElementById('errorMsg').innerText = "Erreur Caméra : " + err.message;
                startBtn.disabled = false;
                startBtn.textContent = "DÉMARRER";
            }
        }

        // =============================================
        // INITIALISATION
        // =============================================
        window.addEventListener('load', () => {
            // Vérification de la compatibilité
            if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
                document.getElementById('errorMsg').innerText = "Votre navigateur ne supporte pas l'API caméra.";
            }
        });
    </script>
</body>
</html>
