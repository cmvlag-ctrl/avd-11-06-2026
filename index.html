<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Test AV Flashé - Auto-Adaptatif</title>
    <style>
        body {
            margin: 0;
            background: #000;
            overflow: hidden;
            font-family: sans-serif;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        #testScreen {
            text-align: center;
            position: relative;
        }
        #letterDisplay {
            font-size: 200px;
            font-weight: bold;
            color: white;
            text-shadow: 0 0 20px #fff;
            opacity: 0;
            transition: opacity 0.1s linear;
        }
        #prompt {
            font-size: 24px;
            margin-top: 20px;
            color: #0f0;
        }
        #stats {
            margin-top: 30px;
            font-size: 18px;
        }
        #startButton {
            background: #4ecdc4;
            border: none;
            padding: 15px 30px;
            font-size: 20px;
            border-radius: 10px;
            cursor: pointer;
            margin-top: 20px;
        }
        #startButton:hover {
            background: #45b7b8;
        }
        .hidden {
            display: none;
        }
    </style>
</head>
<body>
    <div id="testScreen">
        <div id="letterDisplay"></div>
        <div id="prompt">Appuyez sur la lettre que vous avez vue</div>
        <div id="stats"></div>
        <button id="startButton">DÉMARRER LE TEST</button>
    </div>

    <video id="video" playsinline autoplay muted class="hidden"></video>

    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.11.0"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/blazeface@0.0.7"></script>

    <script>
        // --- CONFIGURATION ---
        const letters = "A C D F H L N O P T U V Z".split(" ");
        const flashDuration = 60; // ms
        const cooldownDuration = 1000; // ms entre chaque lettre
        let currentLetter = "";
        let testRunning = false;
        let lastFlashTime = 0;
        let correctAnswers = 0;
        let totalQuestions = 0;
        let distance = 50; // Distance estimée (cm)
        let K_FACTOR = 2800; // Facteur de calibration (à ajuster si nécessaire)

        // --- ÉLÉMENTS DOM ---
        const letterDisplay = document.getElementById('letterDisplay');
        const prompt = document.getElementById('prompt');
        const stats = document.getElementById('stats');
        const startButton = document.getElementById('startButton');
        const video = document.getElementById('video');

        // --- INITIALISATION ---
        startButton.addEventListener('click', startTest);
        document.addEventListener('keydown', handleKeyPress);

        async function startTest() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({
                    video: { facingMode: 'user', width: 640, height: 480 }
                });
                video.srcObject = stream;
                video.play();
                startButton.classList.add('hidden');
                testRunning = true;
                correctAnswers = 0;
                totalQuestions = 0;
                stats.innerHTML = "";
                document.getElementById('testScreen').style.display = 'block';

                // Charger le modèle de détection de visage
                const model = await blazeface.load();

                // Boucle principale
                function loop() {
                    if (!testRunning) return;

                    model.estimateFaces(video, false).then(predictions => {
                        if (predictions.length > 0) {
                            const face = predictions[0];
                            const leftEye = face.landmarks[0];
                            const rightEye = face.landmarks[1];

                            // Calcul de la distance inter-yeux (px)
                            const distInterYeuxPx = Math.sqrt(
                                Math.pow(rightEye[0] - leftEye[0], 2) +
                                Math.pow(rightEye[1] - leftEye[1], 2)
                            );

                            // Calcul de la distance réelle (cm)
                            if (distInterYeuxPx > 5) {
                                distance = K_FACTOR / distInterYeuxPx;
                                distance = Math.max(30, Math.min(200, distance)); // Limite 30-200 cm
                            }
                        }

                        // Afficher une lettre si le temps est écoulé
                        const now = Date.now();
                        if (now - lastFlashTime > cooldownDuration) {
                            showLetter();
                            lastFlashTime = now;
                        }

                        requestAnimationFrame(loop);
                    });
                }
                loop();
            } catch (err) {
                alert("Erreur caméra : " + err.message);
            }
        }

        // --- AFFICHAGE DES LETTRES ---
        function showLetter() {
            if (!testRunning) return;

            // Choisir une lettre aléatoire
            currentLetter = letters[Math.floor(Math.random() * letters.length)];
            letterDisplay.innerText = currentLetter;

            // Calculer la taille adaptative en fonction de la distance
            const letterSizePx = calculateLetterSize(distance, 1.0); // Acuité = 1.0 par défaut
            letterDisplay.style.fontSize = letterSizePx + 'px';

            // Afficher la lettre pendant 60 ms
            letterDisplay.style.opacity = '1';
            setTimeout(() => {
                letterDisplay.style.opacity = '0';
            }, flashDuration);
        }

        // --- CALCUL DE LA TAILLE DES LETTRES ---
        function calculateLetterSize(distCm, acuity) {
            // Formule standard pour les tests d'acuité :
            // À 10/10 (acuité=1.0), une lettre doit avoir une taille angulaire de 5 minutes d'arc.
            // Taille en pixels = (taille_angulaire * distance) / (3438 * tan(1/60))
            // Simplifié : taille_px = (distance_cm * 0.0145) / acuity
            const heightCm = (distCm * 0.0145) / acuity;
            const heightPx = (heightCm / 2.54) * 96; // 96 DPI standard
            return Math.max(50, Math.round(heightPx)); // Taille minimale de 50px
        }

        // --- GESTION DES RÉPONSES ---
        function handleKeyPress(e) {
            if (!testRunning || !currentLetter) return;

            // Vérifier si la touche correspond à la lettre affichée
            const pressedLetter = e.key.toUpperCase();
            if (letters.includes(pressedLetter)) {
                totalQuestions++;
                if (pressedLetter === currentLetter) {
                    correctAnswers++;
                    prompt.innerText = "✅ Correct !";
                    prompt.style.color = "#0f0";
                } else {
                    prompt.innerText = `❌ Faux ! La lettre était : ${currentLetter}`;
                    prompt.style.color = "#f55";
                }

                // Mettre à jour les statistiques
                const accuracy = Math.round((correctAnswers / totalQuestions) * 100);
                stats.innerHTML = `
                    <strong>Score : ${correctAnswers}/${totalQuestions} (${accuracy}%)</strong><br>
                    Distance : ~${Math.round(distance)} cm<br>
                    Taille lettre : ${calculateLetterSize(distance, 1.0)} px
                `;

                // Préparer la prochaine lettre
                setTimeout(() => {
                    prompt.innerText = "Appuyez sur la lettre que vous avez vue";
                    prompt.style.color = "#0f0";
                }, 2000);
            }
        }

        // --- ARRÊTER LE TEST ---
        function stopTest() {
            testRunning = false;
            if (video.srcObject) {
                video.srcObject.getTracks().forEach(track => track.stop());
            }
            document.getElementById('testScreen').style.display = 'none';
            startButton.classList.remove('hidden');
        }
    </script>
</body>
</html>
