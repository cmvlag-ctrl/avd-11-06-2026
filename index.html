<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test d'Acuité Flashée - Version Finale</title>
    <style>
        body {
            margin: 0;
            background: #000;
            font-family: Arial, sans-serif;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            text-align: center;
        }
        #testContainer {
            width: 100%;
            max-width: 1000px;
            padding: 20px;
        }
        #videoContainer {
            position: relative;
            margin-bottom: 20px;
            border: 2px solid #4ecdc4;
            border-radius: 10px;
            overflow: hidden;
            width: 100%;
            max-width: 400px;
            aspect-ratio: 4/3;
        }
        #video {
            width: 100%;
            transform: scaleX(-1); /* Miroir */
        }
        #letterDisplay {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: white;
            text-shadow: 0 0 30px #fff;
            opacity: 0;
            transition: opacity 0.1s linear;
            pointer-events: none;
            font-weight: bold;
            text-align: center;
            z-index: 10;
        }
        #prompt {
            font-size: 24px;
            margin: 20px 0;
            min-height: 60px;
        }
        #validationButtons {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 10px;
            margin: 20px 0;
        }
        .letterButton {
            background: #4ecdc4;
            border: none;
            padding: 15px 20px;
            font-size: 24px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            min-width: 60px;
        }
        .letterButton:hover {
            background: #45b7b8;
        }
        #stats {
            font-size: 20px;
            margin: 20px 0;
            background: rgba(0,0,0,0.5);
            padding: 15px;
            border-radius: 8px;
        }
        #startButton {
            background: #4ecdc4;
            border: none;
            padding: 15px 30px;
            font-size: 20px;
            border-radius: 10px;
            cursor: pointer;
            margin-top: 20px;
            font-weight: bold;
        }
        .hidden { display: none; }
        .correct { color: #0f0; }
        .incorrect { color: #f55; }
        #finalResult {
            font-size: 28px;
            margin: 20px 0;
            background: rgba(0,0,0,0.7);
            padding: 20px;
            border-radius: 10px;
            display: none;
        }
    </style>
</head>
<body>
    <div id="testContainer">
        <h1>Test d'Acuité Visuelle Flashée</h1>
        <p>Identifiez les lettres qui apparaissent brièvement (60 ms)</p>

        <div id="videoContainer">
            <video id="video" playsinline autoplay muted></video>
            <div id="letterDisplay"></div>
        </div>

        <div id="prompt">Cliquez sur "DÉMARRER" pour commencer</div>
        <div id="finalResult"></div>

        <div id="validationButtons" class="hidden">
            <button class="letterButton" data-letter="A">A</button>
            <button class="letterButton" data-letter="C">C</button>
            <button class="letterButton" data-letter="D">D</button>
            <button class="letterButton" data-letter="F">F</button>
            <button class="letterButton" data-letter="H">H</button>
            <button class="letterButton" data-letter="L">L</button>
            <button class="letterButton" data-letter="N">N</button>
            <button class="letterButton" data-letter="O">O</button>
            <button class="letterButton" data-letter="P">P</button>
            <button class="letterButton" data-letter="T">T</button>
            <button class="letterButton" data-letter="U">U</button>
            <button class="letterButton" data-letter="V">V</button>
            <button class="letterButton" data-letter="Z">Z</button>
        </div>

        <div id="stats" class="hidden">
            <strong>Score : </strong><span id="score">0/0 (0%)</span><br>
            <strong>Taille actuelle : </strong><span id="currentSize">--</span>
        </div>

        <button id="startButton">DÉMARRER LE TEST</button>
    </div>

    <script>
        // --- CONFIGURATION ---
        const letters = ["A", "C", "D", "F", "H", "L", "N", "O", "P", "T", "U", "V", "Z"];
        let testRunning = false;
        let correctAnswers = 0;
        let totalQuestions = 0;
        let currentLetter = "";
        let isWaitingForAnswer = false;
        let errorsConsecutives = 0;
        let currentFontSize = 300; // Taille initiale maximale
        const MIN_FONT_SIZE = 20; // Taille minimale avant d'arrêter le test

        // --- ÉLÉMENTS DOM ---
        const letterDisplay = document.getElementById('letterDisplay');
        const prompt = document.getElementById('prompt');
        const stats = document.getElementById('stats');
        const startButton = document.getElementById('startButton');
        const video = document.getElementById('video');
        const validationButtons = document.getElementById('validationButtons');
        const scoreDisplay = document.getElementById('score');
        const currentSizeDisplay = document.getElementById('currentSize');
        const finalResult = document.getElementById('finalResult');

        // --- INITIALISATION ---
        startButton.addEventListener('click', startTest);
        validationButtons.querySelectorAll('.letterButton').forEach(button => {
            button.addEventListener('click', () => handleAnswer(button.dataset.letter));
        });

        // --- DÉMARRER LE TEST ---
        async function startTest() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({
                    video: { facingMode: 'user', width: 400, height: 300 }
                });
                video.srcObject = stream;
                video.play();

                startButton.classList.add('hidden');
                validationButtons.classList.remove('hidden');
                stats.classList.remove('hidden');
                finalResult.style.display = 'none';
                prompt.textContent = "Regardez l'écran...";
                testRunning = true;
                isWaitingForAnswer = false;
                correctAnswers = 0;
                totalQuestions = 0;
                errorsConsecutives = 0;
                currentFontSize = 300;
                updateSizeDisplay();

                // Afficher la première lettre après 1 seconde
                setTimeout(showNextLetter, 1000);

            } catch (err) {
                prompt.innerHTML = `<span class="incorrect">Erreur caméra : ${err.message}</span>`;
                console.error("Erreur caméra:", err);
            }
        }

        // --- METTRE À JOUR L'AFFICHAGE DE LA TAILLE ---
        function updateSizeDisplay() {
            currentSizeDisplay.textContent = `${currentFontSize}px`;
        }

        // --- AFFICHER UNE NOUVELLE LETTRE ---
        function showNextLetter() {
            if (!testRunning) return;

            // Choisir une lettre aléatoire
            currentLetter = letters[Math.floor(Math.random() * letters.length)];

            // Afficher la lettre pendant 60 ms
            letterDisplay.innerText = currentLetter;
            letterDisplay.style.fontSize = `${currentFontSize}px`;
            letterDisplay.style.opacity = '1';

            // Masquer après 60 ms
            setTimeout(() => {
                letterDisplay.style.opacity = '0';
                isWaitingForAnswer = true;
                prompt.innerHTML = `<span class="incorrect">Quelle lettre avez-vous vue ?</span>`;
            }, 60);
        }

        // --- GESTION DES RÉPONSES ---
        function handleAnswer(selectedLetter) {
            if (!testRunning || !isWaitingForAnswer) return;

            totalQuestions++;
            isWaitingForAnswer = false;

            if (selectedLetter === currentLetter) {
                correctAnswers++;
                prompt.innerHTML = `<span class="correct" style="font-size: 28px;">✅ CORRECT !</span>`;
                errorsConsecutives = 0;

                // Réduire la taille de la lettre pour le prochain test
                currentFontSize = Math.max(currentFontSize - 20, MIN_FONT_SIZE);
                updateSizeDisplay();
            } else {
                prompt.innerHTML = `<span class="incorrect" style="font-size: 28px;">❌ FAUX ! C'était : ${currentLetter}</span>`;
                errorsConsecutives++;

                // Augmenter légèrement la taille après une erreur
                currentFontSize = Math.min(currentFontSize + 30, 300);
                updateSizeDisplay();
            }

            // Mettre à jour les statistiques
            const accuracy = Math.round((correctAnswers / totalQuestions) * 100);
            scoreDisplay.textContent = `${correctAnswers}/${totalQuestions} (${accuracy}%)`;

            // Vérifier si on a atteint 3 erreurs consécutives
            if (errorsConsecutives >= 3) {
                endTest();
                return;
            }

            // Désactiver les boutons pendant 2 secondes
            validationButtons.querySelectorAll('.letterButton').forEach(button => {
                button.disabled = true;
            });

            // Attendre 2 secondes avant de montrer la prochaine lettre
            setTimeout(() => {
                prompt.textContent = "Prêt pour la prochaine lettre...";
                validationButtons.querySelectorAll('.letterButton').forEach(button => {
                    button.disabled = false;
                });
                showNextLetter();
            }, 2000);
        }

        // --- ARRÊTER LE TEST ---
        function endTest() {
            testRunning = false;

            // Calculer le résultat final
            const resultText = document.createElement('div');
            resultText.innerHTML = `
                <strong>TEST TERMINÉ</strong><br>
                <strong>Taille minimale identifiable :</strong> ${currentFontSize}px<br>
                <strong>Score final :</strong> ${correctAnswers}/${totalQuestions} (${Math.round((correctAnswers / totalQuestions) * 100)}%)<br>
                <strong>Acuité flashée :</strong> ${currentFontSize <= 40 ? "Excellente" : currentFontSize <= 80 ? "Bonne" : currentFontSize <= 120 ? "Moyenne" : "Faible"}
            `;
            resultText.style.color = '#4ecdc4';
            resultText.style.fontSize = '24px';

            finalResult.innerHTML = '';
            finalResult.appendChild(resultText);
            finalResult.style.display = 'block';

            // Arrêter la caméra
            if (video.srcObject) {
                video.srcObject.getTracks().forEach(track => track.stop());
            }
        }
    </script>
</body>
</html>
